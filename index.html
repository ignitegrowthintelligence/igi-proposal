<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IGI Proposal Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.min.js"></script>
<!-- Multi-file RFP intake parsers (Phase 1): PDF, Word, Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<style>
:root {
  --cyan:       #00aebd;
  --cyan-dark:  #008fa0;
  --bg-nav:     #1a1a1a;
  --bg-page:    #121212;
  --bg-card:    #1e1e1e;
  --bg-sec:     #2a2a2a;
  --border:     #333;
  --text:       #ffffff;
  --text-muted: #888888;
  --text-sec:   #51585c;
  --green:      #75BE19;
  --orange:     #ef9809;
  --red:        #e53935;
  --radius:     4px;
}
[data-theme="light"] {
  --bg-page: #f5f5f5; --bg-card: #ffffff; --bg-sec: #e4e4e5;
  --border: #cccccc; --text: #0a0a0a; --text-muted: #666666; --text-sec: #444444;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Roboto', sans-serif; background: var(--bg-page); color: var(--text); min-height: 100vh; }

/* ── Nav ── */
nav { background: var(--bg-nav); height: 52px; display: flex; align-items: center; padding: 0 24px; gap: 16px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
.nav-logo { display: flex; align-items: center; gap: 8px; font-family: 'Inter', sans-serif; font-weight: 500; font-size: 15px; color: var(--text); text-decoration: none; }
.nav-logo span { color: var(--cyan); }
.nav-spacer { flex: 1; }
.nav-btn { font-family: 'Inter', sans-serif; font-size: 13px; padding: 5px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: color .15s, border-color .15s; }
.nav-btn:hover, .nav-btn.active { color: var(--cyan); border-color: var(--cyan); }
.nav-btn.primary { background: var(--cyan); color: #fff; border-color: var(--cyan); }
.nav-btn.primary:hover { background: var(--cyan-dark); border-color: var(--cyan-dark); color: #fff; }

/* ── Layout ── */
#app { max-width: 1400px; margin: 0 auto; padding: 24px; }

/* ── Home chooser ── */
.home-hero { text-align: center; padding: 48px 0 32px; }
.home-hero h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.home-hero p { color: var(--text-muted); font-size: 15px; }
.entry-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-top: 32px; }
.entry-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 28px 24px; cursor: pointer; transition: border-color .2s, transform .15s; text-align: left; }
.entry-card:hover { border-color: var(--cyan); transform: translateY(-2px); }
.entry-card .ec-icon { font-size: 28px; margin-bottom: 12px; }
.entry-card h3 { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
.entry-card p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
.entry-card .ec-badge { display: inline-block; margin-top: 12px; font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--bg-sec); color: var(--text-muted); font-family: 'Inter', sans-serif; }

/* ── Forms ── */
.form-wrap { max-width: 680px; margin: 0 auto; }
.form-header { margin-bottom: 28px; }
.form-header h2 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.form-header p { font-size: 13px; color: var(--text-muted); }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 13px; font-family: 'Inter', sans-serif; color: var(--text-muted); margin-bottom: 6px; }
.form-group label span { color: var(--red); margin-left: 2px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-family: 'Roboto', sans-serif; font-size: 14px; padding: 9px 12px; outline: none; transition: border-color .15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--cyan); }
.form-group textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.form-group select option { background: var(--bg-card); }
.form-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-actions { display: flex; gap: 12px; margin-top: 28px; }
.btn { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; padding: 8px 20px; border-radius: var(--radius); border: none; cursor: pointer; transition: background .15s, opacity .15s; }
.btn-primary { background: var(--cyan); color: #fff; }
.btn-primary:hover { background: var(--cyan-dark); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: #555; }
.btn-danger { background: var(--red); color: #fff; }

/* Discovery sub-toggle */
.sub-toggle { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.sub-toggle button { flex: 1; padding: 9px 16px; background: transparent; border: none; color: var(--text-muted); font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; transition: background .15s, color .15s; }
.sub-toggle button.active { background: var(--cyan); color: #fff; }

/* Tag input for competitors */
.tag-input-wrap { display: flex; flex-wrap: wrap; gap: 6px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; min-height: 40px; cursor: text; }
.tag-input-wrap:focus-within { border-color: var(--cyan); }
.tag { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-sec); border-radius: 10px; padding: 2px 8px; font-size: 12px; }
.tag button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }
.tag-input { border: none; background: transparent; color: var(--text); font-size: 14px; outline: none; min-width: 120px; flex: 1; }

/* Product multi-select */
.multi-check { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px; }
.multi-check label { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; padding: 4px; }
.multi-check input[type="checkbox"] { accent-color: var(--cyan); }

/* RFP upload */
.dropzone { border: 2px dashed var(--border); border-radius: 8px; padding: 40px 24px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; }
.dropzone:hover, .dropzone.dragging { border-color: var(--cyan); background: rgba(0,174,189,.05); }
.dropzone p { color: var(--text-muted); font-size: 14px; margin-top: 8px; }
.dropzone .dz-icon { font-size: 32px; }

/* ── Generating state ── */
.generating-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; gap: 20px; }
.spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--cyan); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.generating-wrap h3 { font-size: 18px; font-weight: 500; }
.generating-wrap p { font-size: 14px; color: var(--text-muted); text-align: center; max-width: 400px; line-height: 1.6; }
.gen-steps { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.gen-step { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-muted); }
.gen-step.done { color: var(--green); }
.gen-step.active { color: var(--text); }

/* ── Workspace ── */
.workspace { display: grid; grid-template-columns: 1fr 360px; gap: 16px; align-items: start; }
.workspace-left { display: flex; flex-direction: column; gap: 0; }
.proposal-header { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px 8px 0 0; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
.proposal-header h2 { font-size: 17px; font-weight: 500; flex: 1; }
.badge { display: inline-block; font-size: 11px; font-family: 'Inter', sans-serif; padding: 2px 8px; border-radius: 10px; }
.badge-fresh { background: rgba(0,174,189,.15); color: var(--cyan); }
.badge-discovery { background: rgba(117,190,25,.15); color: var(--green); }
.badge-rfp { background: rgba(239,152,9,.15); color: var(--orange); }
.badge-pass { background: rgba(117,190,25,.15); color: var(--green); }
.badge-fail { background: rgba(229,57,53,.15); color: var(--red); }
.badge-draft { background: var(--bg-sec); color: var(--text-muted); }

/* Section cards */
.section-card { background: var(--bg-card); border: 1px solid var(--border); border-top: none; }
.section-card:last-child { border-radius: 0 0 8px 8px; }
.section-header { display: flex; align-items: center; gap: 10px; padding: 12px 20px; cursor: pointer; user-select: none; }
.section-header:hover { background: rgba(255,255,255,.03); }
.section-num { font-size: 11px; color: var(--text-muted); font-family: 'Inter', sans-serif; width: 18px; }
.section-title { font-size: 14px; font-weight: 500; flex: 1; }
.section-confidence { font-size: 11px; font-family: 'Inter', sans-serif; padding: 1px 7px; border-radius: 10px; }
.conf-confirmed { background: rgba(117,190,25,.12); color: var(--green); }
.conf-generated { background: rgba(0,174,189,.12); color: var(--cyan); }
.conf-validate   { background: rgba(239,152,9,.12); color: var(--orange); }
.section-chevron { font-size: 10px; color: var(--text-muted); transition: transform .2s; }
.section-card.open .section-chevron { transform: rotate(90deg); }
.section-body { display: none; padding: 0 20px 20px; }
.section-card.open .section-body { display: block; }
.section-content { font-size: 14px; line-height: 1.7; color: var(--text); white-space: pre-wrap; word-break: break-word; }
.section-content p { margin-bottom: 10px; }
.section-actions { display: flex; gap: 8px; margin-top: 14px; }
.btn-sm { font-size: 12px; padding: 5px 12px; }
.section-edit-area { width: 100%; background: var(--bg-sec); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 13px; font-family: 'Roboto', sans-serif; line-height: 1.6; padding: 10px 12px; resize: vertical; min-height: 120px; outline: none; margin-top: 10px; }
.section-edit-area:focus { border-color: var(--cyan); }

/* Products cards */
.products-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
.product-card { background: var(--bg-sec); border-radius: var(--radius); padding: 12px 14px; }
.product-card h4 { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.product-cat  { font-size: 11px; color: var(--cyan); font-family: 'Inter', sans-serif; margin-bottom: 6px; }
.product-card p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
.product-card .product-benefit { margin-top: 4px; font-size: 12px; color: var(--green); }

/* Case studies */
.case-study-card { background: var(--bg-sec); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; }
.case-study-card h4 { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.case-study-ind { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
.case-study-row { display: flex; gap: 8px; font-size: 12px; margin-bottom: 3px; }
.case-study-label { color: var(--text-muted); min-width: 64px; font-family: 'Inter', sans-serif; }
.case-study-result { color: var(--green); }

/* Why Ignite */
.why-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
.why-item { display: flex; gap: 12px; background: var(--bg-sec); border-radius: var(--radius); padding: 12px 14px; }
.why-icon { font-size: 18px; flex-shrink: 0; }
.why-text { font-size: 13px; line-height: 1.5; }

/* Investment summary */
.inv-narrative { font-size: 14px; line-height: 1.7; margin-bottom: 12px; }
.inv-note { font-size: 12px; color: var(--text-muted); font-style: italic; padding: 10px 14px; background: var(--bg-sec); border-radius: var(--radius); }

/* Workspace bottom bar */
.workspace-bottom { display: flex; gap: 10px; padding: 16px 20px; background: var(--bg-card); border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; }

/* ── Right panel: Chatbot ── */
.workspace-right { position: sticky; top: 68px; display: flex; flex-direction: column; gap: 12px; }
.panel-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; }
.panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.panel-header h3 { font-size: 14px; font-weight: 500; flex: 1; }
.panel-header .panel-icon { font-size: 16px; }

/* Chat */
.chat-messages { height: 380px; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.chat-msg { max-width: 90%; }
.chat-msg.user { align-self: flex-end; }
.chat-msg.ai { align-self: flex-start; }
.chat-bubble { padding: 9px 13px; border-radius: 12px; font-size: 13px; line-height: 1.55; }
.chat-msg.user .chat-bubble { background: var(--cyan); color: #fff; border-radius: 12px 12px 2px 12px; }
.chat-msg.ai .chat-bubble { background: var(--bg-sec); color: var(--text); border-radius: 12px 12px 12px 2px; }
.chat-update-pill { font-size: 11px; margin-top: 5px; color: var(--cyan); cursor: pointer; font-family: 'Inter', sans-serif; }
.chat-input-row { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); }
.chat-input { flex: 1; background: var(--bg-sec); border: 1px solid var(--border); border-radius: 20px; padding: 7px 14px; color: var(--text); font-size: 13px; outline: none; font-family: 'Roboto', sans-serif; }
.chat-input:focus { border-color: var(--cyan); }
.chat-send { background: var(--cyan); border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; color: #fff; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s; }
.chat-send:hover { background: var(--cyan-dark); }

/* Tech Check panel */
.tc-list { display: flex; flex-direction: column; gap: 8px; padding: 12px 14px; }
.tc-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; }
.tc-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.tc-label { flex: 1; line-height: 1.4; }
.tc-detail { font-size: 11px; color: var(--orange); margin-top: 2px; }

/* ── Proposals Library ── */
.library-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.library-header h2 { font-size: 20px; font-weight: 500; flex: 1; }
.proposals-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
.proposals-table th { background: var(--bg-nav); text-align: left; padding: 10px 16px; font-size: 11px; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); border-bottom: 1px solid var(--border); }
.proposals-table td { padding: 13px 16px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
.proposals-table tr:last-child td { border-bottom: none; }
.proposals-table tr:hover td { background: rgba(255,255,255,.02); cursor: pointer; }
.outcome-win  { color: var(--green); font-weight: 500; }
.outcome-loss { color: var(--red); }
.outcome-pending { color: var(--text-muted); }

/* ── Share / read-only view ── */
.share-proposal { max-width: 820px; margin: 0 auto; }
.share-cover { background: linear-gradient(135deg, #1a1a1a 0%, #0d2f35 100%); border-radius: 12px; padding: 48px 48px 40px; margin-bottom: 24px; position: relative; overflow: hidden; }
.share-cover::before { content: ''; position: absolute; top: -60px; right: -60px; width: 240px; height: 240px; background: radial-gradient(circle, rgba(0,174,189,.25) 0%, transparent 70%); }
.share-cover h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
.share-cover .cover-sub { font-size: 14px; color: rgba(255,255,255,.6); margin-bottom: 20px; }
.share-cover .cover-meta { display: flex; gap: 24px; font-size: 13px; color: rgba(255,255,255,.7); }
.share-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 28px 32px; margin-bottom: 16px; }
.share-section h2 { font-size: 16px; font-weight: 600; color: var(--cyan); margin-bottom: 14px; text-transform: uppercase; letter-spacing: .06em; font-size: 12px; font-family: 'Inter', sans-serif; }
.share-section .share-text { font-size: 14px; line-height: 1.75; color: var(--text); white-space: pre-wrap; }

/* ── Tech Check modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: flex; align-items: center; justify-content: center; z-index: 200; }
.modal-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 28px; max-width: 500px; width: 90%; }
.modal-box h3 { font-size: 17px; font-weight: 500; margin-bottom: 16px; }
.modal-checks { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.modal-check { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; background: var(--bg-sec); border-radius: var(--radius); }
.modal-check .mc-icon { font-size: 16px; flex-shrink: 0; }
.modal-check .mc-label { font-size: 13px; font-weight: 500; }
.modal-check .mc-detail { font-size: 12px; color: var(--orange); margin-top: 2px; }

/* Outcome modal */
.outcome-radios { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.outcome-radio { display: none; }
.outcome-label { padding: 7px 16px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; cursor: pointer; transition: border-color .15s, background .15s; }
.outcome-radio:checked + .outcome-label { border-color: var(--cyan); background: rgba(0,174,189,.12); color: var(--cyan); }

/* ── Projected Outcomes (engine-computed budget model) ── */
.bm-table { width: 100%; border-collapse: collapse; margin: 10px 0 4px; font-size: 13px; }
.bm-table th { text-align: left; padding: 7px 10px; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); }
.bm-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.bm-table tr.bm-rec td { background: rgba(0,174,189,.08); }
.bm-table td:first-child { font-weight: 600; }
.bm-tam { font-size: 14px; margin: 4px 0 10px; }
.bm-tam strong { color: var(--cyan); font-size: 17px; }
.bm-note { font-size: 12px; color: var(--text-muted); margin-top: 8px; line-height: 1.5; }
.bm-breakeven { font-size: 13px; color: var(--green); margin-top: 8px; }
.bm-gap { font-size: 12px; border: 1px dashed var(--border); border-radius: var(--radius); padding: 8px 12px; margin-top: 10px; color: var(--text-muted); }

/* ── Print styles for PDF export ── */
@media print {
  nav, .workspace-right, .workspace-bottom, .section-actions, .proposal-header .badge, .nav-btn { display: none !important; }
  .bm-gap { display: none !important; }
  body { background: #fff; color: #000; }
  .workspace { display: block; }
  .section-body { display: block !important; }
  .section-header .section-chevron { display: none; }
  .section-card { border: none; border-bottom: 1px solid #eee; page-break-inside: avoid; }
  .section-content { color: #000; }
}

/* ── Qualification (RFP gate) ── */
.q-banner { border-radius: 8px; padding: 18px 22px; margin-bottom: 16px; border: 1px solid; }
.q-banner.green { background: rgba(117,190,25,.1); border-color: rgba(117,190,25,.45); }
.q-banner.amber { background: rgba(239,152,9,.1); border-color: rgba(239,152,9,.45); }
.q-banner.red   { background: rgba(229,57,53,.1); border-color: rgba(229,57,53,.45); }
.q-banner .q-rec { display: flex; align-items: center; gap: 12px; }
.q-banner h2 { font-size: 19px; font-weight: 700; }
.q-banner.green h2 { color: var(--green); }
.q-banner.amber h2 { color: var(--orange); }
.q-banner.red h2   { color: var(--red); }
.q-fit { font-size: 12px; font-family: 'Inter', sans-serif; padding: 3px 10px; border-radius: 12px; background: var(--bg-sec); color: var(--text); }
.q-rationale { font-size: 13px; line-height: 1.65; margin-top: 12px; color: var(--text); }
.q-chip { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 12px; background: var(--bg-sec); margin: 0 6px 6px 0; font-family: 'Inter', sans-serif; color: var(--cyan); }
.q-conflict { background: rgba(229,57,53,.12); border: 1px solid rgba(229,57,53,.45); border-radius: 6px; padding: 12px 16px; margin-bottom: 16px; }
.q-conflict-title { color: var(--red); font-weight: 700; font-size: 13px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.q-conflict p { font-size: 13px; line-height: 1.55; color: var(--text); }
.q-budget { background: var(--bg-sec); border-radius: 6px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; line-height: 1.6; }
.q-budget strong { color: var(--cyan); }

.q-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.q-table th { text-align: left; padding: 7px 10px; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); border-bottom: 1px solid var(--border); font-family: 'Inter', sans-serif; }
.q-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }

.q-countdown { font-weight: 700; margin-left: auto; }
.q-pri-high { color: var(--red); }

.q-kv { font-size: 13px; line-height: 1.7; }
.q-kv .q-k { color: var(--text-muted); font-family: 'Inter', sans-serif; margin-right: 6px; }
.q-scaffold-flag { font-size: 11px; color: var(--orange); margin-bottom: 8px; }
.q-tldr { font-size: 14px; font-weight: 600; line-height: 1.5; margin-top: 10px; color: var(--text); }
.q-rationale-details { margin-top: 8px; }
.q-rationale-details summary { font-size: 12px; color: var(--cyan); cursor: pointer; font-family: 'Inter', sans-serif; }
.q-rationale-details .q-rationale { margin-top: 8px; }
.q-gaps { background: rgba(239,152,9,.1); border: 1px solid rgba(239,152,9,.35); border-radius: 6px; padding: 10px 14px; margin-bottom: 16px; font-size: 13px; line-height: 1.5; }
.q-gaps strong { color: var(--orange); }
.grade-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px 22px; }
.grade-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.grade-row:last-child { border-bottom: none; }
.grade-crit { flex: 1; }
.grade-pts { font-family: 'Inter', sans-serif; font-size: 12px; background: var(--bg-sec); color: var(--cyan); padding: 3px 10px; border-radius: 10px; white-space: nowrap; }
.grade-total { font-weight: 700; padding-top: 14px; }
.grade-total .grade-pts, .grade-total span:last-child { background: none; color: var(--text); font-family: 'Roboto', sans-serif; font-size: 14px; }

/* ── Phase 4: guided Build Workspace (checklist-left / work-pane-right) ── */
.bw { display: grid; grid-template-columns: 340px 1fr; gap: 16px; align-items: start; }
.bw-left { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; position: sticky; top: 68px; overflow: hidden; }
.bw-head { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
.bw-progress { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.bw-bar { height: 7px; background: var(--bg-sec); border-radius: 4px; overflow: hidden; }
.bw-bar-fill { height: 100%; background: var(--cyan); border-radius: 4px; transition: width .3s; }
.bw-list { max-height: 46vh; overflow-y: auto; padding: 6px 0; }

.bw-item.sel { background: rgba(0,174,189,.1); border-left-color: var(--cyan); }

.bw-note code { color: var(--cyan); font-size: 12px; }
.bw-editor { width: 100%; min-height: 300px; background: var(--bg-sec); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 13px; line-height: 1.65; padding: 12px 14px; resize: vertical; outline: none; font-family: 'Roboto', sans-serif; }
.bw-editor:focus { border-color: var(--cyan); }
.bw-actions { display: flex; gap: 10px; margin-top: 14px; }
.bw-doc { background: var(--bg-sec); border-radius: 6px; padding: 16px 18px; }
.bw-qs { display: flex; flex-direction: column; gap: 16px; }
.bw-q-prompt { font-size: 14px; line-height: 1.5; margin-bottom: 8px; }

.bw-opt { padding: 7px 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-sec); color: var(--text); font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; transition: border-color .15s, background .15s; }
.bw-opt:hover { border-color: var(--cyan); }
.bw-opt.sel { border-color: var(--cyan); background: rgba(0,174,189,.15); color: var(--cyan); font-weight: 500; }
.bw-draft { margin-top: 18px; padding: 14px 16px; background: var(--bg-sec); border-radius: 6px; border-left: 3px solid var(--green); }
@media (max-width: 860px) { .bw { grid-template-columns: 1fr; } .bw-left { position: static; } }

/* ── Misc ── */
.empty-state { text-align: center; padding: 60px 24px; color: var(--text-muted); }
.empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }

</style>

<body>

<div id="app"></div>

</div>

<!-- Modals -->

<div id="modal-outcome" class="modal-overlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">

      <label for="o-win" class="outcome-label">🏆 Won</label>
      <input type="radio" name="outcome" id="o-loss" value="loss" class="outcome-radio">

<script>
// ─── Config ────────────────────────────────────────────────────────────────────
const INTEL_BASE   = 'https://generate-prospect-intel-337108570573.us-east1.run.app';
const INTEL_SECRET = '27f13a7fcad24e283421be25464d8517574212f93e605a6cf02fe40a415aec66'; // fill in before deploy

// ─── State ────────────────────────────────────────────────────────────────────
const S = {
  view:            'home',      // home | form:fresh | form:discovery | form:rfp | analyzing | qualify | generating | workspace | library | share
  proposalContext: null,
  sections:        null,
  rfpSections:     null,        // RFP entry: engine-returned per-RFP section list
  qualification:   null,        // /proposal/qualify result (RFP gate)
  rfpIntake:       null,        // stored RFP form payload, replayed into generate() on Proceed
  proposalId:      null,
  isDirty:         false,
  techCheck:       null,
  chatMessages:    [],
  chatPending:     false,
  competitors:     [],
  productSelections: [],
  proposals:       [],
  shareId:         null,        // for share view
};

// Category list — FALLBACK ONLY. The canonical list is the Supabase categories table,
// served by the Intel Engine at GET /library/categories and loaded below at startup (P2).
const CATEGORIES = [
  'Auto Dealers','Auto Repair','Attorney/Legal','Banks/Financial','Carpet/Flooring',
  'Casual Dining','Cleaning Services','Contractors/Builders','Dentists','Doctors/Clinics',
  'Employment/Recruiting','Eye Care','Farm/Equipment Dealer','Furniture Stores','Gambling/Casinos','Health/Fitness',
  'Home Repair/Hardware','Hospital','Hotel/Resort','HVAC','Insurance','Lawn/Garden',
  'Med Spa','Plumbing','Real Estate','Recreational Vehicle','Salons/Personal Care',
  'Self Storage','Senior Living','University/College','Other',
];
// P2: sync with the canonical Library list ('Other' stays last — it's a UI concept, not a Library category).
fetch(INTEL_BASE + '/library/categories', { headers: { 'X-IGI-Auth': INTEL_SECRET } }).then(r => r.json()).then(j => {
  if (j && Array.isArray(j.categories) && j.categories.length >= 20) {
    CATEGORIES.length = 0;
    j.categories.forEach(c => CATEGORIES.push(c));
    CATEGORIES.push('Other');
  }
}).catch(() => {});

function buildCategorySelect(id, withOtherField) {
  const opts = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
  const otherField = withOtherField ? `
    <div class="form-group" id="${id}-other-wrap" style="display:none;margin-top:10px;">
      <label>Describe the business type <span>*</span></label>
      <input id="${id}-other-text" type="text" placeholder="e.g. Craft brewery, Tattoo studio, Indoor climbing gym…" />
      <div class="form-hint">IGI will reason from first principles — no library benchmarks for custom categories, but site data and AI intelligence still apply.</div>
    </div>` : '';
  return `<select id="${id}" onchange="toggleOtherField('${id}')"><option value="">Select category…</option>${opts}</select>${otherField}`;
}

function toggleOtherField(selectId) {
  const val  = document.getElementById(selectId)?.value;
  const wrap = document.getElementById(selectId + '-other-wrap');
  if (wrap) wrap.style.display = val === 'Other' ? '' : 'none';
}

function resolveCategory(selectId) {
  const cat = v(selectId);
  if (cat !== 'Other') return { category: cat, categoryDescription: null };
  const desc = v(selectId + '-other-text').trim();
  return { category: 'Other', categoryDescription: desc || null };
}

const TSI_PRODUCTS = [
  'SEM (Paid Search)','SEO','Demand Gen','SPARK AI','Targeted Display & Video','Retargeting',
  'CRM Matching / Look-Alike','Native Advertising','Social Display','Facebook/Instagram',
  'FB Lead Gen','TikTok','LinkedIn','Nextdoor','Pinterest','Streaming TV (STV)',
  'Audience Targeted STV','Hulu','YouTube TV','Geofencing','Addressable Geofencing',
  'DOOH','Email Marketing','Programmatic Audio','YouTube TrueView','SSM / Sponsored Social Mentions',
  'First Impression Site Takeover','Listen Live 2.0','Direct Match',
  'Site GrowthEngine Program','Seasonal Spotlight Program','Brick & Mortar Booster Program',
  'Brand Builder Pro Program','1:1 Marketing Program',
];

// ─── API ───────────────────────────────────────────────────────────────────────
async function api(path, body, method = 'POST') {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'X-IGI-Auth': INTEL_SECRET, 'X-IGI-Source': 'proposal' },
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(INTEL_BASE + path, opts);
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || 'API error ' + r.status);
  return j;
}

async function apiGet(path) {
  const r = await fetch(INTEL_BASE + path);
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || 'API error ' + r.status);
  return j;
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function setView(v) {
  S.view = v;
  const isWorkspace = v === 'workspace';
  const isHome      = v === 'home';
  document.getElementById('btn-new').style.display      = isWorkspace ? '' : 'none';
  document.getElementById('btn-save').style.display     = isWorkspace ? '' : 'none';
  document.getElementById('btn-techcheck').style.display= isWorkspace ? '' : 'none';
  document.getElementById('btn-export').style.display   = isWorkspace ? '' : 'none';
  render();
}

function goHome()      { setView('home'); }
function showLibrary() { loadLibrary(); setView('library'); }

// Check for share link on load
function checkShareLink() {
  const hash = window.location.hash;
  if (hash.startsWith('#share/')) {
    S.shareId = hash.replace('#share/', '');
    setView('share');
    loadShare(S.shareId);
  }
}

// ─── Main render ──────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  switch (S.view) {
    case 'home':              app.innerHTML = renderHome();       break;
    case 'form:fresh':        app.innerHTML = renderFormFresh();  attachFormFresh();  break;
    case 'form:discovery':    app.innerHTML = renderFormDisc();   attachFormDisc();   break;
    case 'form:rfp':          app.innerHTML = renderFormRFP();    attachFormRFP();    break;
    case 'analyzing':         app.innerHTML = renderAnalyzing();  break;
    case 'qualify':           app.innerHTML = renderQualify();    attachQualify();    break;
    case 'grading':           app.innerHTML = renderGrading();    break;
    case 'generating':        app.innerHTML = renderGenerating(); break;
    case 'workspace':         app.innerHTML = renderWorkspace();  attachWorkspace();  break;
    case 'library':           app.innerHTML = renderLibrary();    break;
    case 'share':             app.innerHTML = renderShare();      break;
    default:                  app.innerHTML = renderHome();
  }
}

// ─── Home ─────────────────────────────────────────────────────────────────────
function renderHome() {
  return `
<div style="max-width:960px;margin:0 auto;">
  <div class="home-hero">
    <h1>IGI Proposal Builder</h1>
    <p>Build client-ready advertising proposals powered by IGI intelligence</p>
  </div>
  <div class="entry-cards">
    <div class="entry-card" onclick="setView('form:fresh')">
      <div class="ec-icon">✏️</div>
      <h3>Start Fresh</h3>
      <p>Build a proposal from scratch. Enter what you know about the client — IGI does the rest from category intelligence.</p>
      <span class="ec-badge">No prior data needed</span>
    </div>
    <div class="entry-card" onclick="setView('form:discovery')">
      <div class="ec-icon">🔍</div>
      <h3>From Discovery</h3>
      <p>Turn a Discovery Brief into a proposal — pull from IGI Discovery automatically, or fill in what you learned on the call.</p>
      <span class="ec-badge">Richest output</span>
    </div>
    <div class="entry-card" onclick="setView('form:rfp')">
      <div class="ec-icon">📄</div>
      <h3>From RFP</h3>
      <p>Upload or paste an RFP document. IGI parses the requirements and builds a compliant proposal response.</p>
      <span class="ec-badge">For formal RFP responses</span>
    </div>
  </div>
</div>`;
}

// ─── Form: Start Fresh ────────────────────────────────────────────────────────
function renderFormFresh() {
  return `
<div class="form-wrap">
  <div class="form-header">
    <h2>✏️ Start Fresh</h2>
    <p>Enter what you know. If you have a domain, IGI will enrich it automatically.</p>
  </div>
  <div id="form-error"></div>
  <div class="form-row">
    <div class="form-group">
      <label>Client Name <span>*</span></label>
      <input id="f-name" type="text" placeholder="e.g. Riverside HVAC" />
    </div>
    <div class="form-group">
      <label>Website / Domain</label>
      <input id="f-domain" type="text" placeholder="e.g. riversidehvac.com" />
      <div class="form-hint">Optional — unlocks site enrichment, pixel detection, and Places data</div>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Market / City <span>*</span></label>
      <input id="f-market" type="text" placeholder="e.g. Albany, NY" />
    </div>
    <div class="form-group">
      <label>Category <span>*</span></label>
      ${buildCategorySelect('f-category', true)}
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Your Name <span>*</span></label>
      <input id="f-aename" type="text" placeholder="AE name" />
    </div>
    <div class="form-group">
      <label>Your Email</label>
      <input id="f-aeemail" type="email" placeholder="your@email.com" />
    </div>
  </div>
  <div class="form-group">
    <label>Notes for AI (optional)</label>
    <textarea id="f-notes" placeholder="Anything you want the AI to know: what you've heard about this client, their situation, goals, upcoming events, etc."></textarea>
  </div>
  <div class="form-actions">
    <button class="btn btn-ghost" onclick="goHome()">← Back</button>
    <button class="btn btn-primary" id="btn-generate-fresh" onclick="submitFresh()">Generate Proposal →</button>
  </div>
</div>`;
}

function attachFormFresh() {
  document.getElementById('f-name').focus();
}

function submitFresh() {
  const name   = v('f-name');
  const domain = v('f-domain').replace(/^https?:\/\//,'').replace(/\/.*$/,'').trim();
  const market = v('f-market');
  const aeName = v('f-aename');
  const aeEmail= v('f-aeemail');
  const notes  = v('f-notes');
  const { category, categoryDescription } = resolveCategory('f-category');

  if (!name || !market || !category || !aeName) {
    showFormError('Please fill in all required fields.');
    return;
  }
  if (category === 'Other' && !categoryDescription) {
    showFormError('Please describe the business type for "Other" category.');
    return;
  }
  generate({ entryPoint: 'fresh', clientName: name, domain, market, category, categoryDescription, aeName, aeEmail, notes });
}

// ─── Form: Discovery ──────────────────────────────────────────────────────────
// P2 — 7-Element Discovery Core: objective taxonomy drives the KPI options,
// and the KPI target drives the engine's Recommended-tier solver.
const IGI_OBJECTIVES = [
  { v: 'leads',        label: 'Lead Generation',        kpis: ['Leads per month', 'Phone calls per month', 'Form fills per month', 'Appointments per month'] },
  { v: 'foot_traffic', label: 'Foot Traffic / Visits',  kpis: ['Store visits per month', 'Walk-ins per month'] },
  { v: 'online_sales', label: 'Online Sales',           kpis: ['Orders per month', 'Monthly revenue ($)', 'ROAS'] },
  { v: 'awareness',    label: 'Brand Awareness',        kpis: ['Brand searches per month', 'Impressions per month', 'Social reach'] },
  { v: 'recruiting',   label: 'Recruiting / Hiring',    kpis: ['Applications per month', 'Hires per quarter'] },
  { v: 'events',       label: 'Events / Attendance',    kpis: ['Registrations', 'Event attendance'] },
];
function objectiveOptions() {
  return '<option value="">Select objective…</option>' + IGI_OBJECTIVES.map(o => `<option value="${o.v}">${o.label}</option>`).join('');
}
function kpiOptionsFor(objV) {
  const o = IGI_OBJECTIVES.find(x => x.v === objV);
  const list = o ? o.kpis : IGI_OBJECTIVES.flatMap(x => x.kpis);
  return '<option value="">Select KPI…</option>' + list.map(k => `<option>${k}</option>`).join('');
}
function syncKpiOptions(prefix) {
  const sel = document.getElementById(prefix + '-kpi-metric');
  if (sel) sel.innerHTML = kpiOptionsFor(v(prefix + '-objective'));
}
function kpiFieldsHtml(prefix) {
  return `
    <div class="form-row">
      <div class="form-group">
        <label>Marketing Objective</label>

function collectDiscoveryCore(prefix, extras) {
  const core = {};
  const obj = v(prefix + '-objective'); if (obj) core.objective = obj;

  return Object.keys(core).length ? core : null;
}

// Phase 1: multi-file intake — parse PDF / Word / Excel / txt, concatenate into a labeled
// corpus in the RFP text box. Each file shows a status chip. Paste box stays the fallback.
async function handleRFPFile(e) {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  const chipsWrap = document.getElementById('rfp-file-chips');
  const ta = document.getElementById('r-rfp-text');
  for (const file of files) {
    const chip = document.createElement('span');
    chip.style.cssText = 'background:var(--bg-sec);border-radius:10px;padding:3px 10px;font-size:12px;color:var(--text-muted);';
    chip.textContent = '⏳ ' + file.name;
    if (chipsWrap) chipsWrap.appendChild(chip);
    try {
      const clean = (await parseRFPFile(file) || '').trim();
      if (!clean) {
        chip.textContent = '⚠ ' + file.name + ' — no readable text (paste it)';
        chip.style.color = 'var(--orange)';
        continue;
      }
      const block = '===FILE: ' + file.name + '===\n' + clean + '\n===END FILE: ' + file.name + '===\n';
      ta.value = (ta.value.trim() ? ta.value.replace(/\s+$/, '') + '\n\n' : '') + block;
      const words = clean.split(/\s+/).filter(Boolean).length;
      chip.textContent = '✓ ' + file.name + ' — ' + words.toLocaleString() + ' words';
      chip.style.color = 'var(--green)';
    } catch (err) {
      chip.textContent = '✗ ' + file.name + ' — ' + (err.message || 'could not read');
      chip.style.color = 'var(--red)';
    }
  }
  e.target.value = ''; // allow re-selecting the same filename
}

async function parseRFPFile(file) {
  const name = (file.name || '').toLowerCase();
  if (name.endsWith('.pdf')) {
    if (!window.pdfjsLib) throw new Error('PDF reader not loaded');
    const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
    const out = [];
    for (let p = 1; p <= pdf.numPages; p++) {
      const content = await (await pdf.getPage(p)).getTextContent();
      out.push(content.items.map(i => i.str).join(' '));
    }
    const text = out.join('\n');
    if (!text.trim()) throw new Error('image-only PDF — paste text');
    return text;
  }
  if (name.endsWith('.docx')) {
    if (!window.mammoth) throw new Error('Word reader not loaded');
    return (await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() })).value;
  }
  if (name.endsWith('.xlsx') || name.endsWith('.xls')) {
    if (!window.XLSX) throw new Error('Excel reader not loaded');
    const wb = XLSX.read(await file.arrayBuffer(), { type: 'array' });
    return wb.SheetNames
      .map(sn => { const csv = XLSX.utils.sheet_to_csv(wb.Sheets[sn]); return csv.trim() ? '--- Sheet: ' + sn + ' ---\n' + csv : ''; })
      .filter(Boolean).join('\n\n');
  }
  // .txt and anything else → plain text
  return await file.text();
}

function recColor(rec) {

}
function statusPill(status) {

function renderQualify() {
  const q = S.qualification;
  if (!q) return `<div class="empty-state" style="margin-top:60px;"><h3>No qualification available</h3><p>Analyze an RFP first.</p></div>`;
  const intake = S.rfpIntake || {};
  const qual   = q.qualification || {};
  const rec    = qual.recommendation || 'Pursue with Caution';
  const color  = recColor(rec);
  const conflict = qual.conflictFlag || {};
  const budget   = q.budgetConstraint || {};
  const clientName = intake.clientName || q.client || 'This RFP';

  // Conflict flag (H3) — surfaced prominently.
  const conflictHtml = conflict.isConflict ? `
    <div class="q-conflict">
      <div class="q-conflict-title">⚠ Conflict / Fit Warning</div>
      <p>${esc(conflict.reason || 'This RFP may not be a fit for a media seller to respond to (e.g. agency-of-record, buy-side, or media-neutral ask).')}</p>
    </div>` : '';

  // Budget constraint (H2).
  const budgetHtml = (budget.statedFee || budget.mediaBudget || budget.notes) ? `
    <div class="q-budget">
      💰 ${budget.statedFee ? `Stated fee: <strong>${esc(budget.statedFee)}</strong>. ` : ''}${budget.mediaBudget ? `Media budget: <strong>${esc(budget.mediaBudget)}</strong>. ` : ''}${budget.notes ? esc(budget.notes) : ''}
    </div>` : '';

  // Recommendation banner — TL;DR headline + collapsible full rationale (Erin: keep the long case, lead with a one-liner).
  const factors = qual.factors || {};
  const factorRows = Object.entries(factors).filter(([, v]) => v).map(([k, v]) =>
    `<div class="q-kv"><span class="q-k">${esc(k.replace(/([A-Z])/g, ' $1').replace(/^./, c => c.toUpperCase()))}:</span>${esc(v)}</div>`).join('');
  const tldr = qual.tldr || (qual.rationale ? (qual.rationale.match(/^.*?[.!?](\s|$)/) || [qual.rationale])[0].trim() : '');
  const banner = `
    <div class="q-banner ${color}">
      <div class="q-rec">
        <h2>${esc(rec)}</h2>
        ${qual.fitScore ? `<span class="q-fit">Fit: ${esc(qual.fitScore)}</span>` : ''}
      </div>
      ${tldr ? `<div class="q-tldr">${esc(tldr)}</div>` : ''}
      ${qual.rationale && qual.rationale.trim() !== tldr ? `<details class="q-rationale-details"><summary>Full rationale</summary><div class="q-rationale">${esc(qual.rationale)}</div></details>` : ''}
    </div>`;

  // Capability gaps (Erin: tag-driven next action) — services we can't cover internally.
  const gaps = (q.capabilityMatrix || []).filter(c => c.subcontractorNeeded || c.supported === false);
  const doNotPursueRec = /do not/i.test(rec);

  // §0 — Response classification & deliverables map.
  const typeChips = (q.responseType || []).map(t => `<span class="q-chip">${esc(t)}</span>`).join('') || '<span class="q-chip">Unclassified</span>';
  const deliverRows = (q.deliverables || []).map(d => `
    <tr>
      <td><strong>${esc(d.name || '')}</strong>${d.kind ? `<br><span style="font-size:11px;color:var(--text-muted)">${esc(d.kind)}</span>` : ''}</td>
      <td>${esc(d.format || '—')}${d.pageLimit ? `<br><span style="font-size:11px;color:var(--text-muted)">${esc(d.pageLimit)}</span>` : ''}</td>
      <td>${esc(d.owner || d.producedBy || '—')}</td>
      <td>${d.igiCanProduce === 'full' ? '<span class="q-yes">Full</span>' : d.igiCanProduce === 'partial' ? '<span style="color:var(--orange)">Partial</span>' : '<span class="q-no">Routed out</span>'}</td>
      <td>${statusPill(d.status)}</td>
    </tr>`).join('');
  const buildPlanRows = (q.buildPlan || []).map(b => `
    <div class="q-kv"><span class="q-k">${esc(b.deliverableId || '')}</span>${esc(b.action || 'generate')} · owner ${esc(b.owner || '—')}${b.dueCheckpoint ? ` · due ${esc(b.dueCheckpoint)}` : ''}</div>`).join('');
  const deliverablesBody = `
    <div style="margin-bottom:12px">${typeChips}</div>
    ${deliverRows ? `<table class="q-table"><thead><tr><th>Deliverable</th><th>Format</th><th>Owner</th><th>IGI</th><th>Status</th></tr></thead><tbody>${deliverRows}</tbody></table>` : '<p style="color:var(--text-muted);font-size:13px">No distinct deliverables enumerated.</p>'}
    ${buildPlanRows ? `<div style="margin-top:14px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:6px">Build Plan / Roadmap</div>${buildPlanRows}</div>` : ''}`;

  // §3.2 — Submission requirements (typed, per-item status).
  const reqRows = (q.submissionRequirements || []).map((r, i) => `
    <tr>
      <td><strong>${esc(r.name || '')}</strong>${r.type ? `<br><span style="font-size:11px;color:var(--text-muted)">${esc(r.type)}</span>` : ''}</td>
      <td>${r.sourcePage ? 'p.' + esc(r.sourcePage) : '—'}</td>
      <td>${r.aiCanComplete ? '<span class="q-yes">AI can complete</span>' : '<span class="q-owner">Needs user</span>'}</td>
      <td><select class="q-select" onchange="updateReqStatus(${i}, this.value)">
        ${['Not Started', 'In Progress', 'Complete'].map(s => `<option ${(r.status || 'Not Started') === s ? 'selected' : ''}>${s}</option>`).join('')}
      </select></td>
    </tr>`).join('');
  const reqBody = reqRows
    ? `<table class="q-table"><thead><tr><th>Requirement</th><th>Source</th><th>Owner</th><th>Status</th></tr></thead><tbody>${reqRows}</tbody></table>`
    : '<p style="color:var(--text-muted);font-size:13px">No submission requirements extracted.</p>';

  // §5 — Required proposal sections.
  const secRows = (q.requiredProposalSections || []).map(s => `
    <tr>
      <td><strong>${esc(s.title || '')}</strong></td>
      <td>${s.sourcePage ? 'p.' + esc(s.sourcePage) : '—'}</td>

  const secBody = secRows
    ? `<table class="q-table"><thead><tr><th>Required Section</th><th>Source</th><th>Drafting</th></tr></thead><tbody>${secRows}</tbody></table>`
    : '<p style="color:var(--text-muted);font-size:13px">No required sections identified.</p>';

  // §3.3 — Capability matrix.
  const capRows = (q.capabilityMatrix || []).map(c => `
    <tr>
      <td>${esc(c.service || '')}</td>
      <td>${c.supported ? '<span class="q-yes">✅ Supported</span>' : '<span class="q-no">❌ Not offered</span>'}</td>
      <td>${c.subcontractorNeeded ? '<span class="q-owner">Subcontractor</span>' : '—'}</td>
      <td style="font-size:12px;color:var(--text-muted)">${esc(c.note || '')}</td>

  const capBody = capRows
    ? `<table class="q-table"><thead><tr><th>Service</th><th>Fit</th><th>Sub?</th><th>Note</th></tr></thead><tbody>${capRows}</tbody></table>`
    : '<p style="color:var(--text-muted);font-size:13px">No capability matrix generated.</p>';

  // §3.4 — Timeline & critical dates.
  const tlRows = (q.timeline || []).map(t => `
    <div class="q-timeline-item">
      <span style="min-width:150px;font-weight:500">${esc(t.event || '')}</span>
      <span style="color:var(--text-muted)">${fmtDate(t.date)}</span>
      <span class="q-countdown q-pri-${t.priority === 'high' ? 'high' : t.priority === 'med' ? 'med' : 'low'}">${t.countdownDays != null ? (t.countdownDays >= 0 ? 'in ' + t.countdownDays + 'd' : Math.abs(t.countdownDays) + 'd ago') : ''}</span>
    </div>`).join('');
  const tlBody = tlRows || '<p style="color:var(--text-muted);font-size:13px">No dates found.</p>';

  // §3.5 — Submission process.
  const sp = q.submissionProcess || {};
  const spSteps = Array.isArray(sp.steps) && sp.steps.length ? `<ol style="margin:8px 0 0 18px;font-size:13px;line-height:1.7">${sp.steps.map(s => `<li>${esc(s)}</li>`).join('')}</ol>` : '';
  const spBody = (sp.portalOrEmail || sp.fileFormats || spSteps) ? `
    ${sp.portalOrEmail ? `<div class="q-kv"><span class="q-k">Submit via:</span>${esc(sp.portalOrEmail)}</div>` : ''}
    ${sp.physicalCopies ? `<div class="q-kv"><span class="q-k">Physical copies:</span>${esc(sp.physicalCopies)}</div>` : ''}
    ${sp.fileFormats ? `<div class="q-kv"><span class="q-k">File formats:</span>${esc(sp.fileFormats)}</div>` : ''}
    ${sp.portalRegistration ? `<div class="q-kv"><span class="q-k">Registration:</span>${esc(sp.portalRegistration)}</div>` : ''}
    ${sp.deliveryInstructions ? `<div class="q-kv"><span class="q-k">Delivery:</span>${esc(sp.deliveryInstructions)}</div>` : ''}
    ${sp.confirmationRequired != null && sp.confirmationRequired !== false ? `<div class="q-kv"><span class="q-k">Confirmation:</span>${sp.confirmationRequired === true ? 'Required' : esc(sp.confirmationRequired)}</div>` : ''}
    ${spSteps}` : '<p style="color:var(--text-muted);font-size:13px">No submission process details found.</p>';

  // §3.6 — Clarifications (draft email — never auto-sent).
  const cl = q.clarifications || {};
  const clQ = Array.isArray(cl.questions) && cl.questions.length
    ? `<ul style="margin:0 0 0 18px;font-size:13px;line-height:1.7">${cl.questions.map(x => `<li>${esc(x.question || x)}${x.reason ? ` <span style="color:var(--text-muted)">— ${esc(x.reason)}</span>` : ''}</li>`).join('')}</ul>` : '';
  const contact = cl.contact || {};
  const clBody = `
    ${clQ ? `<div style="margin-bottom:10px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:6px">Suggested Questions</div>${clQ}</div>` : ''}
    ${(contact.name || contact.email || contact.phone) ? `<div class="q-kv"><span class="q-k">Contact:</span>${esc([contact.name, contact.email, contact.phone].filter(Boolean).join(' · '))}</div>` : ''}
    ${cl.questionsDeadline ? `<div class="q-kv"><span class="q-k">Questions due:</span>${esc(cl.questionsDeadline)}${cl.countdownDays != null ? ` (in ${cl.countdownDays}d)` : ''}</div>` : ''}
    ${cl.draftEmail ? `<div class="q-email">${esc(cl.draftEmail)}</div><div class="q-email-note">✎ Draft only — review and send this yourself. IGI never sends it for you.</div>` : ''}`;

  // Tag-driven next action (Erin, slide 2): gaps → Connect partner; good fit → Log a pitch; poor fit → Log a pass.
  const gapNote = gaps.length ? `
    <div class="q-gaps">
      <strong>${gaps.length} capability gap${gaps.length > 1 ? 's' : ''}:</strong> ${esc(gaps.map(g => g.service).filter(Boolean).slice(0, 4).join(', '))}${gaps.length > 4 ? '…' : ''} — a partner can cover these.
    </div>` : '';
  const cta = [];
  if (gaps.length) cta.push(`<button class="btn btn-ghost" onclick="connectPartner()">🤝 Connect partner</button>`);
  if (doNotPursueRec) {
    cta.push(`<button class="btn btn-danger" onclick="logPass()">Log as a Pass</button>`);
    cta.push(`<button class="btn btn-ghost" onclick="logPitchAndBuild()">Override &amp; Build →</button>`);
  } else {
    cta.push(`<button class="btn btn-ghost" onclick="logPass()">Log as a Pass</button>`);
    cta.push(`<button class="btn btn-primary" onclick="logPitchAndBuild()">Log as a Pitch → Build</button>`);
  }

  const nb = (n) => n ? `<span class="section-confidence conf-generated">${n}</span>` : '';
  return `
<div class="workspace-left" style="max-width:960px;margin:0 auto">
  <div class="form-header" style="margin-bottom:16px">
    <h2>📋 RFP Qualification — ${esc(clientName)}</h2>
    <p>Review before building. The Workspace stays locked until you log a decision.</p>
  </div>
  ${conflictHtml}
  ${banner}
  ${gapNote}
  ${budgetHtml}
  ${factorRows ? qCard('q-factors', 'Qualification Factors', '', factorRows, false) : ''}
  ${qCard('q-deliverables', 'Response Type &amp; Deliverables Map', nb((q.deliverables || []).length), deliverablesBody, false)}
  ${qCard('q-reqs', 'Submission Requirements', nb((q.submissionRequirements || []).length), reqBody, false)}
  ${qCard('q-sections', 'Required Proposal Sections', nb((q.requiredProposalSections || []).length), secBody, false)}

  ${qCard('q-timeline', 'Timeline &amp; Critical Dates', nb((q.timeline || []).length), tlBody, false)}

// The GATE: RFP entry only reaches the Workspace through here.
function proceedToBuild() {
  const q = S.qualification;
  if (!q) { setView('form:rfp'); return; }
  const rec = (q.qualification && q.qualification.recommendation) || '';
  let overrideReason = null;
  if (/do not/i.test(rec)) {
    overrideReason = prompt('This RFP is flagged "Do Not Pursue". Enter a reason to override and proceed anyway:');
    if (overrideReason === null) return;            // cancelled — stay on the gate
    console.log('[IGI Proposal] Qualification override:', overrideReason);
  }
  const intake = S.rfpIntake || {};
  generate({
    ...intake,
    entryPoint: 'rfp',
    requiredProposalSections: q.requiredProposalSections || [],
    submissionRequirements:   q.submissionRequirements || [],
    budgetConstraint:         q.budgetConstraint || null,
    qualificationOverrideReason: overrideReason,
  });
}

// ─── Phase 2: pipeline logging + tag-driven CTAs ────────────────────────────────
function fmtDate(d) {
  if (!d) return 'TBD';
  const dt = new Date(d);
  if (isNaN(dt.getTime())) return esc(String(d));
  const hasTime = /\d{2}:\d{2}/.test(String(d));
  const opts = hasTime
    ? { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }
    : { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
  return esc(dt.toLocaleString('en-US', opts));
}

async function logPipeline(status, reason) {
  const q = S.qualification || {}, qual = q.qualification || {}, intake = S.rfpIntake || {};
  try {
    await api('/proposal/pipeline', {
      clientName: intake.clientName, market: intake.market, category: intake.category || null,
      recommendation: qual.recommendation || null, fitScore: qual.fitScore || null,
      pipelineStatus: status, reason: reason || null,
      responseType: q.responseType || [], aeName: intake.aeName || null, aeEmail: intake.aeEmail || null,
      timeline: q.timeline || [], budgetConstraint: q.budgetConstraint || null,
    });
    return true;
  } catch (e) {
    console.warn('[IGI Proposal] pipeline log failed:', e.message);
    return false;
  }
}

async function logPitchAndBuild() {
  await logPipeline('pitch');           // record intent; non-blocking on failure
  showToast('Logged as a pitch ✓');
  setView('grading');                   // Phase 3: "how you'll be graded" checkpoint → then build
}

async function logPass() {
  const reason = prompt('Log this RFP as a pass. Optional — why are we passing?');
  if (reason === null) return;          // cancelled
  await logPipeline('pass', reason || 'No reason given');
  showToast('Logged as a pass ✓');
  setView('home');
}

  const gaps = (S.qualification?.capabilityMatrix || []).filter(c => c.subcontractorNeeded || c.supported === false);
  await logPipeline('partner_referral', 'Gaps: ' + gaps.map(g => g.service).filter(Boolean).join(', '));

}

async function generate(payload) {
  S.chatMessages = [];
  S.competitors  = [];
  S.productSelections = [];
  // Non-RFP entries start with a clean qualification/rfpSections slate.
  // RFP entries keep S.qualification (set by the qualify gate) so the checklist pins in the Workspace.
  if (payload.entryPoint !== 'rfp') { S.qualification = null; S.rfpIntake = null; }
  S.rfpSections = null;
  setView('generating');

  setTimeout(() => updateGenStep(1, 'Enriching with Intel Engine…'), 1500);
  setTimeout(() => updateGenStep(2, 'Loading Library intelligence…'), 4000);
  setTimeout(() => updateGenStep(3, 'Generating proposal sections…'), 7000);

  try {
    const result = await api('/proposal/generate', payload);
    updateGenStep(4, 'Done!');
    S.proposalContext = result.proposalContext;
    S.sections        = result.sections;
    S.rfpSections     = result.rfpSections || null;   // RFP entry: engine-built per-RFP sections
    S.proposalId      = null;
    S.isDirty         = true;
    S.techCheck       = null;
    setTimeout(() => setView('workspace'), 400);
  } catch (err) {
    document.getElementById('app').innerHTML = `
      <div class="form-wrap" style="margin-top:40px;">
        <div class="alert alert-error">Generation failed: ${err.message}</div>
        <button class="btn btn-ghost" onclick="goHome()">← Back to Home</button>
      </div>`;
  }
}

// Build items unify RFP required sections (Type B AI-draft / Type C guided Q&A) and
// submission requirements (Type A fixed library doc / Type C guided Q&A).

function docTypeForRequirement(r) {
  const n = ((r.name || '') + ' ' + (r.type || '')).toLowerCase();
  if (/insurance|liability|certificate of insurance/.test(n)) return 'insurance';
  if (/financial condition|financial statement|audited financial|balance sheet/.test(n)) return 'financial_condition';
  if (/w-?9\b/.test(n)) return 'w9';
  if (/non-?collusion/.test(n)) return 'non_collusion';
  if (/sanctions|ukraine|russia|iran/.test(n)) return 'sanctions_cert';
  if (/swam|dbe|\bmbe\b|\bwbe\b|minority|women-?owned|small business/.test(n)) return 'swam_cert';
  return null; // no standing doc → needs input (Type C)
}

function buildItems() {
  const q = S.qualification || {};
  const items = [];
  (S.rfpSections || []).forEach((s, i) => {
    items.push({ id: 'sec-' + i, group: 'Proposal sections', title: s.title || ('Section ' + (i + 1)),
      type: (s.coverage === 'full') ? 'B' : 'C', ref: { kind: 'section', idx: i } });
  });
  (q.submissionRequirements || []).forEach((r, i) => {
    const dt = docTypeForRequirement(r);
    items.push({ id: 'req-' + i, group: 'Submission requirements', title: r.name || ('Requirement ' + (i + 1)),
      type: dt ? 'A' : 'C', docType: dt, ref: { kind: 'requirement', idx: i } });
  });
  return items;
}

function itemObj(item) {
  return item.ref.kind === 'section'
    ? (S.rfpSections || [])[item.ref.idx]
    : ((S.qualification && S.qualification.submissionRequirements) || [])[item.ref.idx];
}

function itemProgress(item) {
  const o = itemObj(item); if (!o) return 0;
  if (item.ref.kind === 'requirement' && item.type === 'A') return (o._attached || o._manual) ? 100 : 0;
  if (o._reviewed || o._done) return 100;
  if (item.type === 'C') {
    const g = o._guided; if (!g) return 0;
    if (o._draft) return 100;
    const answered = (o._answers || []).filter(a => a != null).length;
    return (g.questions && g.questions.length) ? Math.round(60 * answered / g.questions.length) : 0;
  }
  // Type B section: drafted by the engine but not yet reviewed
  return (o.content && String(o.content).trim()) ? 70 : 0;
}

function overallProgress() {
  const items = buildItems(); if (!items.length) return 0;
  return Math.round(items.reduce((s, it) => s + itemProgress(it), 0) / items.length);
}

function renderRfpWorkspace() {
  const ctx = S.proposalContext, c = ctx.client;
  const items = buildItems();
  if (!S.buildSel || !items.find(it => it.id === S.buildSel)) S.buildSel = items[0] && items[0].id;
  const overall = overallProgress();
  const groups = {};
  items.forEach(it => { (groups[it.group] = groups[it.group] || []).push(it); });
  const typeIcon = { A: '📎', B: '✍️', C: '❓' };
  const leftRows = Object.entries(groups).map(([g, its]) => `
    <div class="bw-group">${esc(g)}</div>
    ${its.map(it => { const p = itemProgress(it); const s = it.id === S.buildSel;
      return `<div class="bw-item${s ? ' sel' : ''}" onclick="selectBuildItem('${it.id}')">
        <span class="bw-ic">${p >= 100 ? '✅' : typeIcon[it.type]}</span>
        <span class="bw-item-title">${esc(it.title)}</span>
        <span class="bw-pct">${p}%</span>
      </div>`; }).join('')}`).join('');
  const sel = items.find(it => it.id === S.buildSel);
  return `
<div class="bw">
  <div class="bw-left">
    <div class="bw-head">
      <div style="flex:1"><h2 style="font-size:15px;font-weight:600">${esc(c.name)}</h2>
      <div style="font-size:11px;color:var(--text-muted)">${esc(c.market)}${c.category ? ' · ' + esc(c.category) : ''}</div></div>
      <span class="badge badge-rfp">RFP</span>
    </div>
    <div class="bw-progress">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span>Overall progress</span><strong>${overall}%</strong></div>
      <div class="bw-bar"><div class="bw-bar-fill" style="width:${overall}%"></div></div>
      ${overall >= 100
        ? '<button class="btn btn-primary btn-sm" style="width:100%;margin-top:12px" onclick="finalizeProposal()">✨ Finalize &amp; prose proposal</button>'
        : '<div style="font-size:11px;color:var(--text-muted);margin-top:8px">Everything lives here — progress tracked as you go. Complete every item to finalize.</div>'}
    </div>
    <div class="bw-list">${leftRows}</div>
    <div class="bw-left-foot">
      <button class="btn btn-ghost btn-sm" onclick="runTechCheck()">✅ Tech Check</button>
      <button class="btn btn-ghost btn-sm" onclick="saveProposal()">💾 Save</button>
    </div>
  </div>
  <div class="bw-pane" id="bw-pane">${sel ? renderBuildPane(sel) : '<div class="empty-state"><p>No checklist items.</p></div>'}</div>
</div>`;
}

function refreshBuild() { if (S.view === 'workspace') render(); }

function selectBuildItem(id) { S.buildSel = id; refreshBuild(); }

function renderBuildPane(item) {
  const o = itemObj(item);
  if (item.ref.kind === 'section') {
    return item.type === 'B' ? renderPaneSection(item, o) : renderPaneGuided(item, o);
  }
  if (item.type === 'A') return renderPaneFixedDoc(item, o);
  return renderPaneGuided(item, o);
}

// Type B — AI-drafted section (editable, review to 100%)
function renderPaneSection(item, s) {
  const reviewed = !!s._reviewed;
  return `
  <div class="bw-pane-head"><h3>${esc(item.title)}</h3><span class="section-confidence ${reviewed ? 'conf-confirmed' : 'conf-generated'}">${reviewed ? 'Reviewed' : 'AI Draft'}</span></div>
  <textarea class="bw-editor" id="bw-ed-${item.ref.idx}" oninput="editRfpSection(${item.ref.idx}, this.value)">${esc(String(s.content || ''))}</textarea>
  <div class="bw-actions">
    <button class="btn btn-ghost btn-sm" onclick="regenRfpSection(${item.ref.idx})">↺ Regenerate</button>
    <button class="btn btn-primary btn-sm" onclick="markSectionReviewed(${item.ref.idx})">✓ Mark reviewed</button>
  </div>`;
}

function editRfpSection(i, val) { if (S.rfpSections[i]) { S.rfpSections[i].content = val; S.isDirty = true; } }
function markSectionReviewed(i) { if (S.rfpSections[i]) { S.rfpSections[i]._reviewed = true; S.isDirty = true; } refreshBuild(); }

async function regenRfpSection(i) {
  const s = S.rfpSections[i]; if (!s) return;
  const instruction = prompt('Optional instruction for regenerating "' + (s.title || 'section') + '":') || '';
  const pane = document.getElementById('bw-pane'); if (pane) pane.style.opacity = '.5';
  try {
    const r = await api('/proposal/rfp-regenerate', { title: s.title, rfpText: S.rfpIntake?.rfpText || S.proposalContext?.rfpText || '', instruction, clientName: S.proposalContext?.client?.name, market: S.proposalContext?.client?.market });
    if (r.content) { s.content = r.content; s._reviewed = false; S.isDirty = true; }
  } catch (e) { alert('Regenerate failed: ' + e.message); }
  refreshBuild();
}

// Type A — fixed library document (Phase 5)
function renderPaneFixedDoc(item, r) {
  const doc = (S.libraryDocs || []).find(d => d.doc_type === item.docType);
  if (!doc) {
    return `<div class="bw-pane-head"><h3>${esc(item.title)}</h3><span class="section-confidence conf-validate">No file on record</span></div>
      <div class="bw-note">This is a standing document (<code>${esc(item.docType || 'certification')}</code>). No matching file is in your document library yet — add one to the library so it auto-attaches next time, or mark it handled manually.</div>
      <div class="bw-actions"><button class="btn btn-primary btn-sm" onclick="markReqManual(${item.ref.idx})">Mark handled manually</button></div>`;
  }
  const expired = doc.expires_on && new Date(doc.expires_on) < new Date();
  const attached = !!r._attached;
  return `
  <div class="bw-pane-head"><h3>${esc(item.title)}</h3><span class="section-confidence conf-confirmed">On file</span></div>
  <div class="bw-doc">
    <div style="font-weight:600">${esc(doc.name)}</div>
    ${doc.note ? `<div style="font-size:13px;color:var(--text-muted);margin-top:4px">${esc(doc.note)}</div>` : ''}
    ${expired ? `<div style="color:var(--red);font-size:12px;margin-top:8px">⚠ On file but expired ${esc(doc.expires_on)} — update before submitting.</div>`
      : (doc.expires_on ? `<div style="font-size:12px;color:var(--text-muted);margin-top:8px">Valid through ${esc(doc.expires_on)}</div>` : '')}
    <div style="margin-top:14px;display:flex;gap:12px;align-items:center">
      ${doc.file_url ? `<a href="${esc(doc.file_url)}" target="_blank" rel="noopener" style="color:var(--cyan);font-size:13px">📄 ${esc(doc.name)} ↗</a>` : ''}
      <div style="flex:1"></div>
      <button class="btn ${attached ? 'btn-ghost' : 'btn-primary'} btn-sm" onclick="attachLibraryDoc(${item.ref.idx})">${attached ? '✓ Attached' : 'Attach to proposal'}</button>
    </div>
  </div>`;
}

function attachLibraryDoc(i) {
  const r = S.qualification.submissionRequirements[i]; if (!r) return;
  const item = buildItems().find(it => it.ref.kind === 'requirement' && it.ref.idx === i);
  const doc = (S.libraryDocs || []).find(d => d.doc_type === (item && item.docType));
  r._attached = doc ? doc.id : true; r.status = 'Complete'; S.isDirty = true;
  refreshBuild();
}
function markReqManual(i) { const r = S.qualification.submissionRequirements[i]; if (r) { r._manual = true; r.status = 'Complete'; S.isDirty = true; } refreshBuild(); }

// Type C — guided button-click Q&A (Phase 6)
function renderPaneGuided(item, o) {
  const g = o._guided;
  if (!g) {
    return `<div class="bw-pane-head"><h3>${esc(item.title)}</h3><span class="section-confidence conf-validate">Needs input</span></div>
      <div class="bw-note">This response needs specifics only your team can confirm. IGI turns the RFP's language into a few quick questions and drafts the written response from your answers — no chasing down leaders.</div>
      <div class="bw-actions"><button class="btn btn-primary btn-sm" id="bw-genq" onclick="generateGuided('${item.id}')">Generate guided questions →</button></div>`;
  }
  const answers = o._answers || [];
  const qs = g.questions.map((qq, qi) => `
    <div class="bw-q">
      <div class="bw-q-prompt">${qi + 1}. ${esc(qq.prompt)}</div>
      <div class="bw-q-opts">${(qq.options && qq.options.length ? qq.options : ['Yes', 'No']).map((opt, oi) =>
        `<button class="bw-opt${answers[qi] === opt ? ' sel' : ''}" onclick="answerGuided('${item.id}',${qi},${oi})">${esc(opt)}</button>`).join('')}</div>
    </div>`).join('');
  const allAnswered = g.questions.length && g.questions.every((_, qi) => answers[qi] != null);
  const draft = o._draft;
  return `
  <div class="bw-pane-head"><h3>${esc(item.title)}</h3><span class="section-confidence ${draft ? 'conf-confirmed' : 'conf-validate'}">${draft ? 'Drafted' : 'Answer to draft'}</span></div>
  <div class="bw-qs">${qs}</div>
  <div class="bw-actions">
    <button class="btn btn-primary btn-sm"${allAnswered ? '' : ' disabled style="opacity:.5"'} onclick="composeGuided('${item.id}')">${draft ? '↺ Re-draft response' : 'Draft response from answers'}</button>
  </div>
  ${draft ? `<div class="bw-draft"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:6px">Drafted response — saved to proposal</div><div class="section-content"><p>${esc(draft).replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')}</p></div></div>` : ''}`;
}

async function generateGuided(id) {
  const item = buildItems().find(it => it.id === id); if (!item) return;
  const o = itemObj(item);
  const btn = document.getElementById('bw-genq'); if (btn) { btn.disabled = true; btn.textContent = 'Generating…'; }
  try {
    const r = await api('/proposal/guided-questions', { itemTitle: item.title, rfpText: S.rfpIntake?.rfpText || S.proposalContext?.rfpText || '' });
    o._guided = { questions: Array.isArray(r.questions) ? r.questions : [] };
    o._answers = [];
  } catch (e) { alert('Could not generate questions: ' + e.message); }
  refreshBuild();
}

function answerGuided(id, qi, oi) {
  const item = buildItems().find(it => it.id === id); if (!item) return;
  const o = itemObj(item); const g = o._guided; if (!g) return;
  const opts = (g.questions[qi].options && g.questions[qi].options.length) ? g.questions[qi].options : ['Yes', 'No'];
  o._answers = o._answers || []; o._answers[qi] = opts[oi];
  S.isDirty = true; refreshBuild();
}

async function composeGuided(id) {
  const item = buildItems().find(it => it.id === id); if (!item) return;
  const o = itemObj(item); const g = o._guided; if (!g) return;
  const qa = g.questions.map((qq, qi) => ({ prompt: qq.prompt, answer: (o._answers || [])[qi] || '' }));
  const pane = document.getElementById('bw-pane'); if (pane) pane.style.opacity = '.5';
  try {
    const r = await api('/proposal/guided-compose', { itemTitle: item.title, qa, rfpText: S.rfpIntake?.rfpText || '' });
    o._draft = r.draft || ''; o._done = true;
    o._answeredBy = S.rfpIntake?.aeEmail || S.rfpIntake?.aeName || 'user';
    o._answeredAt = new Date().toISOString();
    if (item.ref.kind === 'requirement') o.status = 'Complete';
    S.isDirty = true;
  } catch (e) { alert('Draft failed: ' + e.message); }
  refreshBuild();
}

// Phase 7 — Finalize / prose assembler
function assembleFinalItems() {
  return buildItems().map(it => {
    const o = itemObj(it); let content = '';
    if (it.ref.kind === 'section') content = o._draft || o.content || '[To be completed]';
    else if (it.type === 'A') content = o._attached ? 'Standing document attached (on file in the library).' : (o._manual ? 'Handled manually.' : '[To be completed]');
    else content = o._draft || '[To be completed]';
    return { title: it.title, content };
  });
}

function finalizeProposal() {
  const c = S.proposalContext.client;
  const body = assembleFinalItems().map(s =>
    `<section><h2>${esc(s.title)}</h2><div>${esc(s.content).replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')}</div></section>`).join('');
  const w = window.open('', '_blank');
  if (!w) { alert('Please allow pop-ups to open the finalized proposal.'); return; }
  w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>${esc(c.name)} — Proposal</title>
    <style>body{font-family:Georgia,serif;max-width:820px;margin:40px auto;padding:0 24px;color:#111;line-height:1.6}
    h1{font-size:26px;border-bottom:3px solid #00aebd;padding-bottom:10px}h2{font-size:17px;color:#00757f;margin-top:28px}
    section{page-break-inside:avoid}</style></head><body>
    <h1>${esc(c.name)}</h1><p style="color:#666">${esc(c.market || '')} · Prepared by ${esc(c.aeName || 'Townsquare Ignite')}</p>
    ${body}</body></html>`);
  w.document.close();
  showToast('Proposal assembled ✓ — print or save as PDF from the new tab');
}

// Phase 8 — Partner ecosystem (stub directory + referral logging)

  { name: 'Creative & content studio (brand, copy, production)', tag: 'creative' },
  { name: 'Public-sector / transit co-bid agency', tag: 'public_sector' },

];
