// ─── RFP section cards (Workspace) ──────────────────────────────────────────────
function renderRfpSectionCard(s, i) {
  const full = s.coverage === 'full';
  const covClass = full ? 'conf-confirmed' : 'conf-validate';
  const covText  = full ? 'Full' : 'Scaffold';
  const flag = !full ? `<div class="q-scaffold-flag">⚑ Scaffold — needs input${s.owner ? ': ' + esc(s.owner) : (s.needsInput ? '' : '')}</div>` : '';
  const body = esc(String(s.content || '')).replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  return `
<div class="section-card" id="sc-rfp-${i}">
  <div class="section-header" onclick="toggleSection('rfp-${i}')">
    <span class="section-num">${i + 1}</span>
    <span class="section-title">${esc(s.title || 'Section')}</span>
    <span class="section-confidence ${covClass}">${covText}</span>
    <span class="section-chevron">▶</span>
  </div>
  <div class="section-body">
    ${flag}
    <div id="view-rfp-${i}"><div class="section-content"><p>${body}</p></div></div>
    <div id="edit-rfp-${i}" style="display:none">
      <textarea class="section-edit-area" id="ta-rfp-${i}" rows="8">${esc(String(s.content || ''))}</textarea>
    </div>
    <div class="section-actions">
      <button class="btn btn-ghost btn-sm" id="editbtn-rfp-${i}" onclick="toggleRfpEdit(${i}, true)">✏️ Edit</button>
      <button class="btn btn-ghost btn-sm" id="savebtn-rfp-${i}" style="display:none" onclick="saveRfpEdit(${i})">✓ Done</button>
    </div>
  </div>
</div>`;
}

function toggleRfpEdit(i, editing) {
  document.getElementById('view-rfp-' + i).style.display   = editing ? 'none' : '';
  document.getElementById('edit-rfp-' + i).style.display   = editing ? '' : 'none';
  document.getElementById('editbtn-rfp-' + i).style.display = editing ? 'none' : '';
  document.getElementById('savebtn-rfp-' + i).style.display = editing ? '' : 'none';
  if (editing) document.getElementById('ta-rfp-' + i).focus();
}

function saveRfpEdit(i) {
  const val = document.getElementById('ta-rfp-' + i).value;
  if (!S.rfpSections || !S.rfpSections[i]) return;
  S.rfpSections[i].content = val;
  if (val.trim()) { S.rfpSections[i].needsInput = false; S.rfpSections[i].coverage = 'full'; }
  S.isDirty = true;
  const body = esc(val).replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  document.getElementById('view-rfp-' + i).innerHTML = `<div class="section-content"><p>${body}</p></div>`;
  toggleRfpEdit(i, false);
  syncQualFromSections();   // flip matching checklist items toward Complete
}

// Pinned qualification checklist — updates as sections are drafted / statuses change.
function renderQualPin() {
  return `
<div class="panel-card">
  <div class="panel-header"><span class="panel-icon">📋</span><h3>RFP Checklist</h3></div>
  <div id="qual-pin-inner" class="tc-list">${renderQualPinInner()}</div>
</div>`;
}

function renderQualPinInner() {
  const q = S.qualification;
  if (!q) return '';
  const reqs = (q.submissionRequirements || []).map((r, i) => `
    <div class="tc-item">
      <div class="tc-icon">${r.status === 'Complete' ? '✅' : r.status === 'In Progress' ? '🔸' : '⬜'}</div>
      <div style="flex:1">
        <div class="tc-label">${esc(r.name || '')}</div>
        <select class="q-select" style="margin-top:4px" onchange="updateReqStatus(${i}, this.value)">
          ${['Not Started', 'In Progress', 'Complete'].map(s => `<option ${(r.status || 'Not Started') === s ? 'selected' : ''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>`).join('') || '<div style="font-size:12px;color:var(--text-muted)">None</div>';
  const secs = (q.requiredProposalSections || []).map(s => `
    <div class="tc-item">
      <div class="tc-icon">${s._drafted ? '✅' : '⬜'}</div>
      <div class="tc-label">${esc(s.title || '')}</div>
    </div>`).join('') || '<div style="font-size:12px;color:var(--text-muted)">None</div>';
  return `
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:6px">Submission Requirements</div>${reqs}
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin:12px 0 6px">Required Sections</div>${secs}`;
}

// When a Workspace section is drafted, flip its matching required-section checklist item.
function syncQualFromSections() {
  if (!S.qualification || !Array.isArray(S.rfpSections)) return;
  const drafted = new Set(
    S.rfpSections.filter(s => s.content && s.content.trim() && !s.needsInput)
      .map(s => (s.title || '').toLowerCase().trim())
  );
  (S.qualification.requiredProposalSections || []).forEach(rs => {
    if (drafted.has((rs.title || '').toLowerCase().trim())) rs._drafted = true;
  });
  const pin = document.getElementById('qual-pin-inner');
  if (pin) pin.innerHTML = renderQualPinInner();
}

// ─── Projected Outcomes — deterministic, engine-computed (discovery entries only) ───
function fmtMoney(n) { return n == null ? '—' : '$' + Number(n).toLocaleString(); }

function renderBudgetModelBody(bm, forClient) {
  const noteBlock = `<div class="bm-note">${(bm.assumptions || []).map(esc).join(' · ')}<br>Sources: ${(bm.sources || []).map(esc).join(' · ')}</div>`;
  if (bm.mode === 'demand' && bm.tam) {
    const tierRow = (t, cls, label) => `
      <tr class="${cls}">
        <td>${esc(label || t.name)}</td>
        <td>${fmtMoney(t.monthlyBudget)}/mo</td>
        <td>${(t.clicks || 0).toLocaleString()}</td>
        <td>${t.sharePct != null ? t.sharePct + '%' : '—'}</td>
        <td>${(t.leads || 0).toLocaleString()}</td>
        <td>${t.monthlyRevenueOpportunity ? fmtMoney(t.monthlyRevenueOpportunity) + '/mo' : '—'}</td>
        <td style="font-size:12px;color:var(--text-muted)">${esc(t.kpiLine || t.why || '')}</td>
      </tr>`;
    const rows = (bm.tiers || []).map(t => tierRow(t, t.name === 'Recommended' ? 'bm-rec' : '')).join('')
      + (bm.statedBudgetOutcome ? tierRow(bm.statedBudgetOutcome, '', 'Your stated budget') : '');
    return `
      <div class="bm-tam"><strong>${bm.tam.monthlySearches.toLocaleString()}</strong> tracked monthly searches — ${esc(bm.tam.locationUsed || 'market')}${bm.tam.competitorBrandExcluded ? ` <span style="font-size:12px;color:var(--text-muted)">(${bm.tam.competitorBrandExcluded} competitor-brand term${bm.tam.competitorBrandExcluded > 1 ? 's' : ''} excluded)</span>` : ''}</div>
      <table class="bm-table">
        <thead><tr><th>Tier</th><th>Investment</th><th>Est. Clicks</th><th>Share of Demand</th><th>Leads/mo</th><th>Est. Value</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${bm.breakeven ? `<div class="bm-breakeven">✓ ${esc(bm.breakeven.line)}</div>` : ''}
      ${(!forClient && bm.budgetGap) ? `<div class="bm-gap">💡 AE note: ${esc(bm.budgetGap)}</div>` : ''}
      ${noteBlock}`;
  }
  return `
    ${bm.breakeven ? `<div class="bm-breakeven">✓ ${esc(bm.breakeven.line)}</div>` : ''}
    ${bm.statedBudgetOutcome ? `<div class="bm-tam" style="margin-top:10px">At ${esc(bm.statedBudgetOutcome.label || fmtMoney(bm.statedBudgetOutcome.monthlyBudget) + '/mo')}: <strong>~${(bm.statedBudgetOutcome.leads || 0).toLocaleString()} leads/mo</strong>${bm.statedBudgetOutcome.monthlyRevenueOpportunity ? ' → ' + fmtMoney(bm.statedBudgetOutcome.monthlyRevenueOpportunity) + '/mo revenue opportunity' : ''}${bm.statedBudgetOutcome.kpiLine ? ' — ' + esc(bm.statedBudgetOutcome.kpiLine) : ''}</div>` : ''}
    ${bm.tamPending ? `<div class="bm-note">${esc(bm.tamPending)}</div>` : ''}
    ${noteBlock}`;
}

function renderBudgetModelCard(bm) {
  return `
<div class="section-card open" id="sc-budgetModel">
  <div class="section-header" onclick="toggleSection('budgetModel')">
    <span class="section-num">📈</span>

    <span class="section-chevron">▶</span>
  </div>
  <div class="section-body">${renderBudgetModelBody(bm, false)}</div>

function renderSectionCard(def, num) {
  const content = S.sections ? S.sections[def.key] : null;
  const hasValidate = content && JSON.stringify(content).includes('[Validate on Call]');
  const confLabel   = hasValidate ? 'validate' : 'generated';
  const confText    = { confirmed: 'Confirmed', generated: 'AI Generated', validate: 'Validate on Call' };
  const confClass   = { confirmed: 'conf-confirmed', generated: 'conf-generated', validate: 'conf-validate' };

  return `
<div class="section-card" id="sc-${def.key}">
  <div class="section-header" onclick="toggleSection('${def.key}')">
    <span class="section-num">${num}</span>
    <span style="margin-right:6px;">${def.icon}</span>
    <span class="section-title">${def.label}</span>
    <span class="section-confidence ${confClass[confLabel]}">${confText[confLabel]}</span>
    <span class="section-chevron">▶</span>
  </div>
  <div class="section-body">
    <div id="view-${def.key}">
      ${renderSectionContent(def, content)}
    </div>
    <div id="edit-${def.key}" style="display:none">
      <textarea class="section-edit-area" id="ta-${def.key}" rows="8">${editableText(def, content)}</textarea>
    </div>
    <div class="section-actions">
      <button class="btn btn-ghost btn-sm" id="editbtn-${def.key}" onclick="toggleEdit('${def.key}', true)">✏️ Edit</button>
      <button class="btn btn-ghost btn-sm" id="savebtn-${def.key}" style="display:none" onclick="saveEdit('${def.key}')">✓ Done</button>
      <button class="btn btn-ghost btn-sm" onclick="regenSection('${def.key}')">↺ Regenerate</button>
    </div>
  </div>
</div>`;
}

function renderSectionContent(def, content) {
  if (!content) return '<p style="color:var(--text-muted);font-size:13px;">No content generated.</p>';

  switch (def.type) {
    case 'products':
      if (!Array.isArray(content)) return `<div class="section-content">${esc(JSON.stringify(content, null, 2))}</div>`;
      return `<div class="products-grid">${content.map(p => `
        <div class="product-card">
          <h4>${esc(p.productName || '')}</h4>
          <div class="product-cat">${esc(p.category || '')}</div>
          <p>${esc(p.rationale || '')}</p>
          ${p.keyBenefit ? `<div class="product-benefit">✓ ${esc(p.keyBenefit)}</div>` : ''}
        </div>`).join('')}</div>`;

    case 'casestudies':
      if (!Array.isArray(content)) return `<div class="section-content">${esc(JSON.stringify(content, null, 2))}</div>`;
      return content.map(cs => `
        <div class="case-study-card">
          <h4>${esc(cs.clientName || '')}</h4>
          <div class="case-study-ind">${esc(cs.industry || '')}</div>
          <div class="case-study-row"><span class="case-study-label">Challenge:</span><span>${esc(cs.challenge || '')}</span></div>
          <div class="case-study-row"><span class="case-study-label">Solution:</span><span>${esc(cs.solution || '')}</span></div>
          <div class="case-study-row"><span class="case-study-label">Result:</span><span class="case-study-result">${esc(cs.result || '')}</span></div>
        </div>`).join('');

    case 'whyignite':
      const icons = ['👥', '📊', '⚡'];
      if (!Array.isArray(content)) return `<div class="section-content">${esc(String(content))}</div>`;
      return `<div class="why-list">${content.map((item, i) => `
        <div class="why-item">
          <div class="why-icon">${icons[i] || '•'}</div>
          <div class="why-text">${esc(item)}</div>
        </div>`).join('')}</div>`;

    case 'investment':
      const inv = content || {};
      return `
        <div class="inv-narrative">${esc(inv.narrative || '')}</div>
        <div class="inv-note">${esc(inv.investmentNote || 'Package details to be completed by your Ignite rep.')}</div>`;

    default:
      return `<div class="section-content">${esc(String(content)).replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')}</div>`;
  }
}

function editableText(def, content) {
  if (!content) return '';
  if (typeof content === 'string') return content;
  return JSON.stringify(content, null, 2);
}

function toggleSection(key) {
  const card = document.getElementById('sc-' + key);
  if (card) card.classList.toggle('open');
}

function toggleEdit(key, editing) {
  document.getElementById('view-' + key).style.display  = editing ? 'none' : '';
  document.getElementById('edit-' + key).style.display  = editing ? '' : 'none';
  document.getElementById('editbtn-' + key).style.display = editing ? 'none' : '';
  document.getElementById('savebtn-' + key).style.display = editing ? '' : 'none';
  if (editing) document.getElementById('ta-' + key).focus();
}

function saveEdit(key) {
  const raw = document.getElementById('ta-' + key).value;
  const def = SECTION_DEFS.find(d => d.key === key);
  if (!def) return;
  let parsed = raw;
  if (def.type !== 'text') {
    try { parsed = JSON.parse(raw); } catch { /* keep as string */ }
  }
  S.sections[key] = parsed;
  S.isDirty = true;
  // Re-render the view part
  document.getElementById('view-' + key).innerHTML = renderSectionContent(def, S.sections[key]);
  toggleEdit(key, false);
}

async function regenSection(key) {
  const def = SECTION_DEFS.find(d => d.key === key);
  if (!def) return;
  const instruction = prompt('Optional: specific instruction for this section (leave blank for default regeneration)');
  if (instruction === null) return; // cancelled
  const card = document.getElementById('sc-' + key);
  if (card) card.style.opacity = '.5';
  try {
    const result = await api('/proposal/section/regenerate', {
      sectionKey: key,
      proposalContext: S.proposalContext,
      currentSections: S.sections,
      instruction: instruction || '',
    });
    S.sections[key] = result.content;
    S.isDirty = true;
    document.getElementById('view-' + key).innerHTML = renderSectionContent(def, S.sections[key]);
    document.getElementById('ta-' + key).value = editableText(def, S.sections[key]);
  } catch (err) {
    alert('Regeneration failed: ' + err.message);
  } finally {
    if (card) card.style.opacity = '1';
  }
}

function attachWorkspace() {
  const isRfp = S.proposalContext?.entryPoint === 'rfp' && Array.isArray(S.rfpSections) && S.rfpSections.length;
  if (isRfp) {
    // Guided Build Workspace (Phase 4) — load the document library once for Type-A auto-attach (Phase 5).
    if (S.libraryDocs == null) {
      S.libraryDocs = [];
      api('/proposal/library/docs', undefined, 'GET').then(r => {
        if (r && Array.isArray(r.docs)) { S.libraryDocs = r.docs; if (S.view === 'workspace') render(); }
      }).catch(() => {});
    }
    return;
  }
  const first = document.getElementById('sc-executiveSummary');
  if (first) first.classList.add('open');
}

// ─── Chatbot ──────────────────────────────────────────────────────────────────
async function sendChat() {
  if (S.chatPending) return;
  const inp = document.getElementById('chat-input');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';

  S.chatMessages.push({ role: 'user', content: msg });
  S.chatPending = true;

  const box = document.getElementById('chat-messages');
  box.innerHTML += `<div class="chat-msg user"><div class="chat-bubble">${esc(msg)}</div></div>`;
  box.innerHTML += `<div class="chat-msg ai" id="chat-pending"><div class="chat-bubble" style="color:var(--text-muted)">Thinking…</div></div>`;
  box.scrollTop = box.scrollHeight;

  try {
    const result = await api('/proposal/chat', {
      proposalContext: S.proposalContext,
      sections: S.sections,
      messages: S.chatMessages,
    });

    const pending = document.getElementById('chat-pending');
    let html = `<div class="chat-bubble">${esc(result.response).replace(/\n/g, '<br>')}</div>`;

    if (result.updateSection) {
      const def = SECTION_DEFS.find(d => d.key === result.updateSection.key);
      if (def) {
        html += `<div class="chat-update-pill" onclick="applyUpdate('${result.updateSection.key}', ${JSON.stringify(result.updateSection.content)})">↑ Apply update to "${def.label}"</div>`;
      }
    }

    if (pending) pending.innerHTML = html;
    S.chatMessages.push({ role: 'assistant', content: result.response });
    box.scrollTop = box.scrollHeight;
  } catch (err) {
    const pending = document.getElementById('chat-pending');
    if (pending) pending.innerHTML = `<div class="chat-bubble" style="color:var(--red)">Error: ${esc(err.message)}</div>`;
  } finally {
    S.chatPending = false;
  }
}

function applyUpdate(key, content) {
  S.sections[key] = content;
  S.isDirty = true;
  const def = SECTION_DEFS.find(d => d.key === key);
  const view = document.getElementById('view-' + key);
  const ta   = document.getElementById('ta-' + key);
  if (view && def) view.innerHTML = renderSectionContent(def, content);
  if (ta) ta.value = editableText(def, content);
  // Expand the updated section
  const card = document.getElementById('sc-' + key);
  if (card) card.classList.add('open');
}

// ─── Tech Check ───────────────────────────────────────────────────────────────
async function runTechCheck() {
  try {
    const q = S.qualification || {};
    const result = await api('/proposal/techcheck', {
      sections: S.sections,
      entryPoint: S.proposalContext?.entryPoint,
      rfpText: S.proposalContext?.rfpText || null,   // P5: RFP-coverage gate needs the source text
      // Qualification-seeded compliance panel (fixes C2/C3): the source of truth is what qualify extracted.
      submissionRequirements:   q.submissionRequirements || null,
      requiredProposalSections: q.requiredProposalSections || null,
      budgetConstraint:         q.budgetConstraint || null,
      rfpSections:              S.rfpSections || null,
    });
    S.techCheck = result;
    S.isDirty = true;

    // Show modal — checks grouped into Draft Quality vs RFP Compliance panels.
    document.getElementById('modal-checks').innerHTML = renderTechCheckModal(result);
    document.getElementById('btn-export-modal').disabled = result.status !== 'pass';
    document.getElementById('btn-export-modal').style.opacity = result.status !== 'pass' ? '.4' : '1';
    document.getElementById('modal-techcheck').style.display = '';

    // Update proposal header badge
    const ws = document.getElementById('app');
    if (ws) render(); // re-render workspace with updated badge
  } catch (err) {
    alert('Tech Check error: ' + err.message);
  }
}

// Group checks by their `panel` field (draft vs compliance). Older responses w/o the
// field fall back into the Draft panel so nothing is lost.
function techCheckGroups(tc) {
  const groups = { draft: [], compliance: [] };
  (tc.checks || []).forEach(c => {
    const p = c.panel === 'compliance' ? 'compliance' : 'draft';
    groups[p].push(c);
  });
  return groups;
}

function renderTechCheckPanel() {
  const tc = S.techCheck;
  if (!tc) return '';
  const groups = techCheckGroups(tc);
  const meta = tc.panels || {};
  const renderGroup = (name, label, checks) => {
    if (!checks.length) return '';
    const gStatus = (meta[name] && meta[name].status) || (checks.every(c => c.pass) ? 'pass' : 'fail');
    const items = checks.map(c => `
      <div class="tc-item">
        <div class="tc-icon">${c.pass ? '✅' : '❌'}</div>
        <div>
          <div class="tc-label">${esc(c.label)}</div>
          ${c.detail ? `<div class="tc-detail">${esc(c.detail)}</div>` : ''}
        </div>
      </div>`).join('');
    return `
    <div class="panel-card">
      <div class="panel-header">
        <span class="panel-icon">${gStatus === 'pass' ? '✅' : '⚠️'}</span>
        <h3>${label} — ${gStatus === 'pass' ? 'Pass' : 'Needs Review'}</h3>
      </div>
      <div class="tc-list">${items}</div>
    </div>`;
  };
  return renderGroup('draft', 'Draft Quality', groups.draft) + renderGroup('compliance', 'RFP Compliance', groups.compliance);
}

function renderTechCheckModal(tc) {
  const groups = techCheckGroups(tc);
  const section = (name, label, checks) => !checks.length ? '' : `
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin:6px 0 8px">${label}</div>
    ${checks.map(c => `
      <div class="modal-check">
        <div class="mc-icon">${c.pass ? '✅' : '❌'}</div>
        <div>
          <div class="mc-label">${esc(c.label)}</div>
          ${c.detail ? `<div class="mc-detail">${esc(c.detail)}</div>` : ''}
        </div>
      </div>`).join('')}`;
  return section('draft', 'Draft Quality', groups.draft) + section('compliance', 'RFP Compliance', groups.compliance);
}

function closeModal() { document.getElementById('modal-techcheck').style.display = 'none'; }

async function saveProposal() {

function showToast(msg) {

  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:var(--green);color:#fff;padding:10px 18px;border-radius:6px;font-size:13px;z-index:300;';

  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function showExportMenu() {

function exportPPTX() {
  document.getElementById('export-menu').style.display = 'none';
  if (typeof PptxGenJS === 'undefined') { alert('PowerPoint library not loaded. Try refreshing the page.'); return; }

  const prs  = new PptxGenJS();
  const ctx  = S.proposalContext;
  const c    = ctx.client;
  const cyan = '00aebd';
  const dark = '1a1a1a';
  const white = 'FFFFFF';

  prs.defineLayout({ name: 'PROPOSAL', width: 13.33, height: 7.5 });
  prs.layout = 'PROPOSAL';

  // Slide 1: Cover
  const s1 = prs.addSlide();
  s1.background = { color: dark };
  s1.addText('IGNITE GROWTH INTELLIGENCE', { x: 0.5, y: 0.4, w: 12, h: 0.4, color: cyan, fontSize: 10, fontFace: 'Inter', bold: true, charSpacing: 3 });
  s1.addText(c.name, { x: 0.5, y: 1.5, w: 12, h: 1.2, color: white, fontSize: 40, fontFace: 'Roboto', bold: true });
  s1.addText('Digital Advertising Proposal', { x: 0.5, y: 2.9, w: 12, h: 0.5, color: 'AAAAAA', fontSize: 16, fontFace: 'Roboto' });
  s1.addText(c.market + (c.category ? ' · ' + c.category : ''), { x: 0.5, y: 3.6, w: 12, h: 0.4, color: '666666', fontSize: 13, fontFace: 'Roboto' });
  s1.addText('Prepared by ' + (c.aeName || 'Townsquare Ignite'), { x: 0.5, y: 6.8, w: 12, h: 0.3, color: '555555', fontSize: 11, fontFace: 'Roboto' });
  s1.addShape(prs.ShapeType.rect, { x: 0.5, y: 4.2, w: 1.5, h: 0.04, fill: { color: cyan } });

  // Slides for each section
  SECTION_DEFS.forEach(def => {
    const content = S.sections && S.sections[def.key];
    if (!content) return;

    const slide = prs.addSlide();
    slide.background = { color: '121212' };

    // Section label
    slide.addText(def.label.toUpperCase(), { x: 0.5, y: 0.3, w: 12, h: 0.3, color: cyan, fontSize: 10, fontFace: 'Inter', bold: true, charSpacing: 3 });
    slide.addShape(prs.ShapeType.rect, { x: 0.5, y: 0.65, w: 12.3, h: 0.02, fill: { color: '333333' } });

    // Content
    let bodyText = '';
    if (typeof content === 'string') {
      bodyText = content;
    } else if (Array.isArray(content)) {
      if (def.key === 'productsAndSolutions') {
        bodyText = content.map(p => (p.productName || '') + ': ' + (p.rationale || '')).join('\n');
      } else if (def.key === 'proofOfConcept') {
        bodyText = content.map(cs => cs.clientName + ' (' + cs.industry + '): ' + cs.result).join('\n');
      } else if (def.key === 'whyIgnite') {
        bodyText = content.join('\n');
      } else {
        bodyText = content.join('\n');
      }
    } else if (def.key === 'investmentSummary') {
      bodyText = (content.narrative || '') + '\n\n' + (content.investmentNote || '');
    }

    slide.addText(bodyText, {
      x: 0.5, y: 0.9, w: 12.3, h: 6.2,
      color: white, fontSize: 13, fontFace: 'Roboto',
      valign: 'top', wrap: true, lineSpacingMultiple: 1.4,
    });

    // Engine-computed Projected Outcomes slide, right after Our Strategy
    if (def.key === 'ourStrategy' && ctx.budgetModel && ctx.budgetModel.mode === 'demand' && ctx.budgetModel.tiers && ctx.budgetModel.tiers.length) {
      const bm = ctx.budgetModel;
      const so = prs.addSlide();
      so.background = { color: '121212' };
      so.addText('PROJECTED OUTCOMES', { x: 0.5, y: 0.3, w: 12, h: 0.3, color: cyan, fontSize: 10, fontFace: 'Inter', bold: true, charSpacing: 3 });
      so.addShape(prs.ShapeType.rect, { x: 0.5, y: 0.65, w: 12.3, h: 0.02, fill: { color: '333333' } });
      so.addText(bm.tam.monthlySearches.toLocaleString() + ' tracked monthly searches — ' + (bm.tam.locationUsed || ''), { x: 0.5, y: 0.85, w: 12.3, h: 0.45, color: white, fontSize: 16, fontFace: 'Roboto', bold: true });
      const hd = (t) => ({ text: t, options: { bold: true, color: cyan, fontSize: 11, fill: { color: '1a1a1a' } } });
      const cell = (t) => ({ text: String(t), options: { color: white, fontSize: 12, fill: { color: '181818' } } });
      const tRows = [['Tier', 'Investment', 'Est. Clicks', 'Share', 'Leads/mo', 'Est. Value'].map(hd)];
      const pushRow = (t, label) => tRows.push([
        label || t.name, fmtMoney(t.monthlyBudget) + '/mo', (t.clicks || 0).toLocaleString(),
        (t.sharePct != null ? t.sharePct + '%' : '—'), (t.leads || 0).toLocaleString(),
        t.monthlyRevenueOpportunity ? fmtMoney(t.monthlyRevenueOpportunity) + '/mo' : '—',
      ].map(cell));
      bm.tiers.forEach(t => pushRow(t));
      if (bm.statedBudgetOutcome) pushRow(bm.statedBudgetOutcome, 'Your stated budget');
      so.addTable(tRows, { x: 0.5, y: 1.5, w: 12.3, border: { pt: 0.5, color: '333333' }, rowH: 0.45 });
      if (bm.breakeven) so.addText('✓ ' + bm.breakeven.line, { x: 0.5, y: 5.7, w: 12.3, h: 0.4, color: '4CAF50', fontSize: 12, fontFace: 'Roboto' });
      so.addText((bm.sources || []).join(' · '), { x: 0.5, y: 6.9, w: 12.3, h: 0.3, color: '666666', fontSize: 9, fontFace: 'Roboto' });
    }
  });

  prs.writeFile({ fileName: (c.name || 'IGI_Proposal').replace(/\s+/g, '_') + '_Proposal.pptx' });
}

      <td>${statusBadge}</td>
      <td class="${outcomeClass[outcome] || ''}">${outcomeLabel[outcome] || '—'}</td>
      <td style="color:var(--text-muted);font-size:12px">${p.updatedAt ? p.updatedAt.slice(0, 10) : '—'}</td>
    </tr>`;
  }).join('');

  return `
<div>
  <div class="library-header">
    <h2>All Proposals</h2>
    <button class="btn btn-primary btn-sm" onclick="goHome()">+ New Proposal</button>
  </div>
  <table class="proposals-table">
    <thead><tr>
      <th>Client</th><th>Category</th><th>Type</th><th>Status</th><th>Outcome</th><th>Updated</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
</div>`;
}

async function openProposal(id) {
  try {
    const data = await apiGet('/proposal/' + id);
    S.proposalContext = data.proposalContext;
    S.sections        = data.sections;
    S.proposalId      = data.id;
    S.techCheck       = data.techCheck;
    S.isDirty         = false;
    S.chatMessages    = [];
    setView('workspace');
  } catch (err) {
    alert('Could not load proposal: ' + err.message);
  }
}

// ─── Share View ───────────────────────────────────────────────────────────────
async function loadShare(id) {
  try {
    const data = await apiGet('/proposal/' + id);
    S.proposalContext = data.proposalContext;
    S.sections        = data.sections;
    S.proposalId      = data.id;
    render();
  } catch (err) {
    document.getElementById('app').innerHTML = `
      <div class="empty-state" style="margin-top:60px;">
        <h3>Proposal not found</h3>
        <p>${esc(err.message)}</p>
      </div>`;
  }
}

function renderShare() {
  if (!S.proposalContext || !S.sections) {
    return `<div class="generating-wrap"><div class="spinner"></div><p>Loading proposal…</p></div>`;
  }
  const ctx = S.proposalContext;
  const c   = ctx.client;
  const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  const shareCards = SECTION_DEFS.map(def => {
    const content = S.sections[def.key];
    if (!content) return '';
    return `
    <div class="share-section">
      <h2>${def.icon} ${def.label}</h2>
      ${renderShareContent(def, content)}
    </div>`;
  });
  if (ctx.budgetModel) shareCards.splice(4, 0, `
    <div class="share-section">
      <h2>📈 Projected Outcomes</h2>
      ${renderBudgetModelBody(ctx.budgetModel, true)}
    </div>`);
  const sectionHtml = shareCards.join('');

  return `
<div class="share-proposal">
  <div class="share-cover">
    <h1>${esc(c.name)}</h1>
    <div class="cover-sub">Digital Advertising Proposal</div>
    <div class="cover-meta">
      <span>📍 ${esc(c.market)}</span>
      ${c.category ? `<span>🏷 ${esc(c.category)}</span>` : ''}
      <span>📅 ${today}</span>
      ${c.aeName ? `<span>👤 ${esc(c.aeName)}</span>` : ''}
    </div>
  </div>
  ${sectionHtml}
  <div style="text-align:center;padding:24px;color:var(--text-muted);font-size:12px;">
    Prepared by Townsquare Ignite · Powered by IGI Proposal Builder
  </div>
</div>`;
}

function renderShareContent(def, content) {
  if (def.key === 'productsAndSolutions' && Array.isArray(content)) {
    return content.map(p => `
      <div class="share-text" style="padding:10px 0;border-bottom:1px solid var(--border)">
        <strong>${esc(p.productName || '')}</strong> <span style="color:var(--cyan);font-size:12px">${esc(p.category || '')}</span><br>
        ${esc(p.rationale || '')}<br>
        ${p.keyBenefit ? `<span style="color:var(--green);font-size:13px">✓ ${esc(p.keyBenefit)}</span>` : ''}
      </div>`).join('');
  }
  if (def.key === 'proofOfConcept' && Array.isArray(content)) {
    return content.map(cs => `
      <div style="padding:12px 0;border-bottom:1px solid var(--border)">
        <strong class="share-text">${esc(cs.clientName || '')} · ${esc(cs.industry || '')}</strong>
        <div class="share-text" style="margin-top:6px;font-size:13px;color:var(--text-muted)">Challenge: ${esc(cs.challenge || '')}</div>
        <div class="share-text" style="font-size:13px;color:var(--text-muted)">Solution: ${esc(cs.solution || '')}</div>
        <div class="share-text" style="font-size:13px;color:var(--green);margin-top:4px;">Result: ${esc(cs.result || '')}</div>
      </div>`).join('');
  }
  if (def.key === 'whyIgnite' && Array.isArray(content)) {
    const icons = ['👥', '📊', '⚡'];
    return `<div>${content.map((item, i) => `
      <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:20px">${icons[i] || '•'}</span>
        <div class="share-text">${esc(item)}</div>
      </div>`).join('')}</div>`;
  }
  if (def.key === 'investmentSummary') {
    const inv = content || {};
    return `<div class="share-text">${esc(inv.narrative || '')}</div>
            <div style="margin-top:12px;padding:10px 14px;background:var(--bg-sec);border-radius:4px;font-size:13px;color:var(--text-muted);font-style:italic">${esc(inv.investmentNote || '')}</div>`;
  }
  return `<div class="share-text">${esc(String(content)).replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>')}</div>`;
}

// ─── Outcome modal ────────────────────────────────────────────────────────────
function showOutcomeModal() {
  document.getElementById('modal-outcome').style.display = '';
}

async function submitOutcome() {
  if (!S.proposalId) { alert('Save the proposal first.'); return; }
  const result = document.querySelector('input[name="outcome"]:checked')?.value;
  if (!result) { alert('Select an outcome.'); return; }
  const notes = document.getElementById('outcome-notes').value;
  try {
    await api('/proposal/outcome', { id: S.proposalId, result, notes });
    document.getElementById('modal-outcome').style.display = 'none';
    showToast('Outcome recorded ✓');
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function v(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function showFormError(msg) {
  const el = document.getElementById('form-error');
  if (el) { el.innerHTML = `<div class="alert alert-error">${esc(msg)}</div>`; el.scrollIntoView({ behavior: 'smooth' }); }
}

// ─── Expose all event handlers to window (needed for inline onclick in some browser contexts) ──
Object.assign(window, {
  goHome, showLibrary, setView, render,
  runTechCheck, saveProposal, showExportMenu, closeModal,
  exportPDF, exportPPTX, copyShareLink,
  sendChat, applyUpdate,
  toggleSection, toggleEdit, saveEdit, regenSection,
  showOutcomeModal, submitOutcome,
  switchDiscTab, addCompetitor, removeCompetitor, toggleProduct,
  submitFresh, submitDiscAuto, submitDiscManual, submitRFP,
  handleRFPFile, toggleOtherField,
  proceedToBuild, updateReqStatus, toggleRfpEdit, saveRfpEdit,
  logPitchAndBuild, logPass, connectPartner, fmtDate,
  selectBuildItem, editRfpSection, markSectionReviewed, regenRfpSection,
  attachLibraryDoc, markReqManual, generateGuided, answerGuided, composeGuided,
  finalizeProposal, openPartnerDirectory,
});

// ─── Boot ────────────────────────────────────────────────────────────────────────────
try {
  checkShareLink();
  if (S.view === 'home') render();
} catch(e) {
  console.error('[IGI Proposal] Boot error:', e);
  document.getElementById('app').innerHTML = '<div class="empty-state" style="margin-top:60px;"><h3>Something went wrong</h3><p style="color:var(--red)">' + e.message + '</p></div>';
}
